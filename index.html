const App = ({ user }) => {
  const [tab, setTab] = useState('dashboard');
  const [gallos, setGallos] = useState([]);
  const [opciones, setOpciones] = useState({});
  const [toastMsg, setToastMsg] = useState(null);
  const [isCollaborator, setIsCollaborator] = useState(false);
  const [myRole, setMyRole] = useState('viewer');
  const [activeOwnerId, setActiveOwnerId] = useState(user.id);
  const [collaborators, setCollaborators] = useState([]);
  const [showEquipo, setShowEquipo] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const isAdmin = (user.email || '').toLowerCase() === 'yoel2792@gmail.com';
  const [showWelcome, setShowWelcome] = React.useState(false);
  const [showTutorial, setShowTutorial] = React.useState(false);

  const handleTutorialDone = React.useCallback(() => {
    localStorage.setItem('tutorial_done_' + user.id, '1');
    setShowTutorial(false);
    setShowWelcome(false);
  }, [user.id]);
  const canEdit = !isCollaborator || myRole === 'editor';

  // Show tutorial for first-time users
  React.useEffect(() => {
    const key = 'tutorial_done_' + user.id;
    if (!localStorage.getItem(key)) {
      setShowWelcome(true);
    }
  }, [user.id]);

  useEffect(() => {
    const checkAccess = async () => {
      const { data: active } = await supabase.from('memberships')
        .select('*').eq('collaborator_id', user.id).eq('status', 'active').maybeSingle();
      if (active) {
        // app_user = usuario independiente con sus propios datos, NO colaborador
        if (active.role !== 'app_user') {
          setIsCollaborator(true); setMyRole(active.role); setActiveOwnerId(active.owner_id);
        }
        return;
      }
      const { data: pending } = await supabase.from('memberships')
        .select('*').eq('collaborator_email', user.email).eq('status', 'pending').maybeSingle();
      if (pending) {
        await supabase.from('memberships').update({ collaborator_id: user.id, status: 'active' }).eq('id', pending.id);
        if (pending.role !== 'app_user') {
          setIsCollaborator(true); setMyRole(pending.role); setActiveOwnerId(pending.owner_id);
        }
        return;
      }
      const { data: collabs } = await supabase.from('memberships')
        .select('*').eq('owner_id', user.id).order('created_at', { ascending: false });
      setCollaborators(collabs || []);
    };
    checkAccess();
  }, []);

  const toast = useCallback((msg, type = 'success') => {
    setToastMsg({ msg, type });
    setTimeout(() => setToastMsg(null), 3000);
  }, []);

  const loadGallos = useCallback(async () => {
    const { data } = await supabase.from('gallos').select('*').eq('user_id', activeOwnerId).order('nombre');
    setGallos(data || []);
  }, [activeOwnerId]);

  const addOpcion = useCallback(async (categoria, valor) => {
    const clean = valor.trim();
    if (!clean) return;
    setOpciones(prev => ({ ...prev, [categoria]: [...(prev[categoria] || []), clean] }));
    await supabase.from('opciones_dinamicas').insert({ user_id: activeOwnerId, categoria, valor: clean });
  }, [activeOwnerId]);

  useEffect(() => { loadGallos(); }, [loadGallos]);

  useEffect(() => {
    const loadOpciones = async () => {
      const { data } = await supabase.from('opciones_dinamicas').select('*').eq('user_id', activeOwnerId);
      const map = {};
      (data || []).forEach(({ categoria, valor }) => {
        if (!map[categoria]) map[categoria] = [];
        map[categoria].push(valor);
      });
      setOpciones(map);
    };
    loadOpciones();
  }, [activeOwnerId]);

  const TABS = [
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'gallos', label: '🐓 Gallos' },
    { id: 'entrenamientos', label: '🏋️ Entrenamientos' },
    { id: 'peleas', label: '⚔️ Peleas' },
  ];

  return (
    <AppContext.Provider value={{ gallos, loadGallos, opciones, addOpcion, toast, activeOwnerId, canEdit }}>
      <div className="min-h-screen bg-gray-100 pb-20">
        <div className="bg-red-700 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-40 shadow-md">
          <div>
            <h1 className="text-lg font-bold leading-tight">🐓 Gallero PR</h1>
            {isCollaborator && <p className="text-xs text-red-200">Viendo gallos ajenos ({myRole})</p>}
          </div>
          <div className="flex items-center gap-2">
            {isAdmin && (
              <button onClick={() => setShowAdmin(true)} className="bg-yellow-500 hover:bg-yellow-400 text-yellow-900 px-3 py-1.5 rounded-lg text-xs font-semibold">
                ⚙️ Usuarios
              </button>
            )}
            {!isCollaborator && (
              <button onClick={() => setShowEquipo(true)} className="bg-red-600 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-semibold">
                👥 Equipo
              </button>
            )}
            <button onClick={() => { supabase.auth.signOut().then(() => { window.location.href = window.location.pathname; }); }}
              className="bg-red-800 hover:bg-red-900 px-3 py-1.5 rounded-lg text-xs font-semibold">
              Salir
            </button>
          </div>
        </div>

        <div className="px-4 py-4 max-w-2xl mx-auto">
          {tab === 'gallos' && <GeneticaModule />}
          {tab === 'entrenamientos' && <EntrenamientosModule />}
          {tab === 'peleas' && <PeleasModule />}
          {tab === 'dashboard' && <DashboardModule />}
        </div>

        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 shadow-lg">
          <div className="flex max-w-2xl mx-auto">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`flex-1 py-3 text-center text-xs font-medium transition-colors ${tab === t.id ? 'text-red-700 border-t-2 border-red-700 -mt-px' : 'text-gray-500 hover:text-gray-700'}`}>
                {t.label}
              </button>
            ))}
          </div>
        </nav>

        {toastMsg && <Toast message={toastMsg.msg} type={toastMsg.type} onClose={() => setToastMsg(null)} />}

        {showEquipo && (
          <GestionEquipoModal
            onClose={() => setShowEquipo(false)}
            user={user}
            collaborators={collaborators}
            setCollaborators={setCollaborators}
          />
        )}
        {showAdmin && <AdminModal onClose={() => setShowAdmin(false)} user={user} />}
        {showWelcome && !showTutorial && (
          <WelcomePrompt
            onYes={() => { setShowWelcome(false); setShowTutorial(true); }}
            onNo={handleTutorialDone}
          />
        )}
        {showTutorial && (
          <TutorialModal onFinish={handleTutorialDone} onSkip={handleTutorialDone} />
        )}
      </div>
    </AppContext.Provider>
  );
};

// ============================================
// LOGIN
// ============================================
const LoginScreen = ({ onLogin }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const { data, error: authError } = await supabase.auth.signInWithPassword({
      email: email.trim().toLowerCase(),
      password: password.trim()
    });
    if (authError) { setError('Email o contraseña incorrectos'); setLoading(false); return; }
    onLogin(data.user);
    setLoading(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-b from-red-700 to-red-900 flex flex-col items-center justify-center px-6">
      <div className="mb-8 text-center">
        <div className="text-6xl mb-3">🐓</div>
        <h1 className="text-3xl font-bold text-white">Gallero PR</h1>
        <p className="text-red-200 mt-1 text-sm">Sistema de Gestión de Gallos</p>
      </div>
      <form onSubmit={handleLogin} className="w-full max-w-sm bg-white rounded-2xl shadow-xl p-6 space-y-4">
        <h2 className="text-xl font-bold text-gray-800 text-center">Iniciar Sesión</h2>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <Input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" required />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <Input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required />
        </div>
        {error && <p className="text-sm text-red-600 bg-red-50 p-2 rounded-lg text-center">{error}</p>}
        <button type="submit" disabled={loading}
          className="w-full bg-red-700 text-white py-3 rounded-xl font-bold text-base hover:bg-red-800 disabled:opacity-50 transition">
          {loading ? 'Entrando...' : 'Entrar'}
        </button>
      </form>
      <p className="text-red-300 text-xs mt-6">Acceso solo por invitación</p>
    </div>
  );
};

// ============================================
// RAÍZ
// ============================================
const AuthRoot = () => {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setChecking(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return (
    <div className="min-h-screen bg-red-700 flex items-center justify-center">
      <div className="text-white text-center">
        <div className="text-5xl mb-3">🐓</div>
        <p className="text-lg font-semibold">Cargando...</p>
      </div>
    </div>
  );

  if (!user) return <LoginScreen onLogin={setUser} />;
  return <ErrorBoundary><App user={user} /></ErrorBoundary>;
};

ReactDOM.render(<AuthRoot />, document.getElementById('root'));
    </script>
</body>
</html>
