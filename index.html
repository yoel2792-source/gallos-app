// ============================================
// ERROR BOUNDARY — muestra el error en pantalla en vez de página en blanco
// ============================================
class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: '20px', fontFamily: 'monospace', background: '#fff' }}>
          <h2 style={{ color: 'red' }}>⚠️ Error en la app</h2>
          <pre style={{ background: '#fee', padding: '12px', borderRadius: '8px', fontSize: '12px', whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
            {this.state.error.toString()}{'\n\n'}{this.state.error.stack}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
  return (
    <div className={`fixed top-4 right-4 left-4 md:left-auto md:w-80 ${bg} text-white px-4 py-3 rounded-lg shadow-lg z-50 fade-in`}>

// Componente para subir una foto (perfil del gallo)
const PhotoUpload = ({ value, onChange, label }) => {
  const fileRef = useRef();
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('La imagen debe ser menor a 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => onChange(ev.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div>
      <p className="text-sm font-medium text-gray-700 mb-1">{label || 'Foto'}</p>
      {value ? (
        <div className="relative inline-block">
          <img src={value} className="w-24 h-24 object-cover rounded-lg border-2 border-gray-200" />
          <button onClick={() => onChange(null)} className="absolute -top-2 -right-2 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">✕</button>
        </div>
      ) : (
        <button onClick={() => fileRef.current.click()} className="w-24 h-24 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center text-gray-400 hover:border-red-400 hover:text-red-400 transition">
          <span className="text-2xl">📷</span>
          <span className="text-[10px] mt-1">Agregar</span>
        </button>
      )}
      <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp,image/heic" className="hidden" onChange={handleFile} />
    </div>
  );
};

// Componente para subir múltiples fotos (entrenamientos)
const MultiPhotoUpload = ({ values, onChange, label }) => {
  const fileRef = useRef();
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('La imagen debe ser menor a 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => onChange([...(values || []), ev.target.result]);
    reader.readAsDataURL(file);
  };
  const removeAt = (i) => onChange(values.filter((_, idx) => idx !== i));
  return (
    <div>
      <p className="text-sm font-medium text-gray-700 mb-1">{label || 'Fotos'}</p>
      <div className="flex gap-2 flex-wrap">
        {(values || []).map((src, i) => (
          <div key={i} className="relative">
            <img src={src} className="w-20 h-20 object-cover rounded-lg border-2 border-gray-200" />
            <button onClick={() => removeAt(i)} className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center">✕</button>
          </div>
        ))}
        <button onClick={() => fileRef.current.click()} className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center text-gray-400 hover:border-green-400 hover:text-green-400 transition">
          <span className="text-xl">📷</span>
          <span className="text-[9px]">+ Foto</span>
        </button>
      </div>
      <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp,image/heic" className="hidden" onChange={handleFile} />
    </div>
  );
};

// ============================================
// COMPONENTE: Búsqueda de Gallo (reutilizable)
// ============================================
const GalloSearch = ({ gallos, onSelect, selected, onClear, placeholder, filter }) => {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef();

  const filtered = useMemo(() => {
    if (!q) return [];
    const query = q.toLowerCase();
    let list = gallos;
    if (filter) list = list.filter(filter);
    return list.filter(g =>
      (g.nombre && g.nombre.toLowerCase().includes(query)) ||
      (g.numero_pinches && g.numero_pinches.toString().includes(query))
    ).slice(0, 10);
  }, [q, gallos, filter]);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  if (selected) {
    return (
      <div className="flex items-center gap-2 p-2.5 bg-red-50 border border-red-200 rounded-lg">
        <span className="flex-1 text-sm font-medium text-red-800">
          {selected.nombre || ''} {selected.numero_pinches ? `(#${selected.numero_pinches})` : ''}
        </span>
        <button onClick={onClear} className="text-xs text-red-600 hover:text-red-800 font-medium">Cambiar</button>
      </div>
    );
  }

  return (
    <div className="relative" ref={ref}>
      <Input
        type="text" placeholder={placeholder || 'Buscar gallo...'}
        value={q} onChange={e => { setQ(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
      />
      {open && q && (
        <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-30 max-h-48 overflow-y-auto">
          {filtered.length > 0 ? filtered.map(g => (
            <button key={g.id} onClick={() => { onSelect(g); setQ(''); setOpen(false); }}
              className="w-full text-left px-3 py-2.5 hover:bg-red-50 border-b border-gray-100 last:border-0">
              <p className="font-medium text-gray-800 text-sm">{g.nombre || 'Sin nombre'} {g.numero_pinches ? `(#${g.numero_pinches})` : ''}</p>
              <p className="text-xs text-gray-500">{g.linea_genetica || 'Sin línea'} • {g.sexo} {g.amarrado ? '• Amarrado' : ''}</p>
            </button>
          )) : <p className="px-3 py-2.5 text-sm text-gray-400">No encontrado</p>}
        </div>
      )}
    </div>
  );
};

const VideoAnalysisModal = ({ gallo, onClose }) => {
  const { gallos } = useContext(AppContext);
  const [step, setStep] = useState('setup');
  const [momento, setMomento] = useState('inicio');
  const [notas, setNotas] = useState('');
  const [selectedGallo, setSelectedGallo] = useState(gallo || null);
  const [galloDesc, setGalloDesc] = useState(
    gallo ? ((gallo.nombre || ('#' + gallo.numero_pinches)) + (gallo.color ? ', color ' + gallo.color : '')) : ''
  );
  const [mediaRecorder, setMediaRecorder] = useState(null);
  const [videoBlob, setVideoBlob] = useState(null);
  const [videoUrl, setVideoUrl] = useState(null);
  const [recording, setRecording] = useState(false);
  const [seconds, setSeconds] = useState(0);
  const [analysis, setAnalysis] = useState(null);
  const [rawText, setRawText] = useState('');
  const [error, setError] = useState('');
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);
  const fileInputRef = useRef(null);
  const MAX_SECONDS = 90;

  const stopCamera = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  };

  useEffect(() => {
    return () => { stopCamera(); if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  const handleFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setError('');
    let blob = file;
    // Comprimir si pesa más de 5MB
    if (file.size > 5 * 1024 * 1024) {
      setStep('compressing');
      try { blob = await compressVideo(file); } catch (_) { blob = file; }
    }
    if (blob.size > 18 * 1024 * 1024) {
      setError('Video demasiado grande (' + (blob.size/1024/1024).toFixed(1) + 'MB). Graba un clip más corto.');
      setStep('setup'); return;
    }
    setVideoBlob(blob);
    setVideoUrl(URL.createObjectURL(blob));
    setSeconds(0);
    setStep('preview');
  };

  const startCamera = async () => {
    setError('');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
      setStep('recording');
    } catch (e) {
      setError('No se pudo acceder a la cámara: ' + e.message);
    }
  };

  const startRecording = () => {
    if (!streamRef.current) return;
    chunksRef.current = [];
    const mr = new MediaRecorder(streamRef.current, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 800000 });
    mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
    mr.onstop = () => {
      const blob = new Blob(chunksRef.current, { type: 'video/webm' });
      setVideoBlob(blob);
      setVideoUrl(URL.createObjectURL(blob));
      stopCamera();
      setStep('preview');
    };
    mr.start(1000);
    setMediaRecorder(mr);
    setRecording(true);
    setSeconds(0);
    timerRef.current = setInterval(() => {
      setSeconds(s => {
        if (s + 1 >= MAX_SECONDS) { mr.state !== 'inactive' && mr.stop(); clearInterval(timerRef.current); setRecording(false); return s + 1; }
        return s + 1;
      });
    }, 1000);
  };

  const stopRecording = () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if (timerRef.current) clearInterval(timerRef.current);
    setRecording(false);
  };

  const retake = () => { setVideoBlob(null); setVideoUrl(null); setSeconds(0); setError(''); setStep('setup'); };

  // Comprime el video usando canvas: redimensiona a 640px ancho, 600kbps, 15fps
  const compressVideo = (blob) => new Promise((resolve, reject) => {
    const vid = document.createElement('video');
    vid.muted = true;
    vid.playsInline = true;
    vid.playbackRate = 2; // 2x = comprime en la mitad del tiempo
    const url = URL.createObjectURL(blob);
    vid.src = url;
    vid.onloadedmetadata = () => {
      const scale = Math.min(1, 640 / Math.max(vid.videoWidth, 1));
      const w = Math.round(vid.videoWidth * scale);
      const h = Math.round(vid.videoHeight * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      const stream = canvas.captureStream(15);
      const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 600000 });
      const chunks = [];
      rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      rec.onstop = () => { URL.revokeObjectURL(url); resolve(new Blob(chunks, { type: 'video/webm' })); };
      rec.start(500);
      vid.play();
      const draw = () => { if (!vid.ended && !vid.paused) { ctx.drawImage(vid, 0, 0, w, h); requestAnimationFrame(draw); } };
      vid.onplay = () => requestAnimationFrame(draw);
      vid.onended = () => rec.stop();
      vid.onerror = e => { URL.revokeObjectURL(url); reject(e); };
    };
    vid.onerror = e => { URL.revokeObjectURL(url); reject(e); };
  });

  const analyzeVideo = async () => {
    if (!videoBlob) return;
    setStep('analyzing');
    setError('');
    try {
      // Auto-comprimir si pesa más de 5MB
      let blobToSend = videoBlob;
      if (videoBlob.size > 5 * 1024 * 1024) {
        try {
          blobToSend = await compressVideo(videoBlob);
        } catch (compErr) {
          // Si falla la compresión, intentar con el original
          blobToSend = videoBlob;
        }
      }
      if (blobToSend.size > 18 * 1024 * 1024) {
        setError('Video demasiado grande incluso después de comprimir. Intenta con un clip más corto (menos de 30s).');
        setStep('preview'); return;
      }
      const arrayBuffer = await blobToSend.arrayBuffer();
      const bytes = new Uint8Array(arrayBuffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i += 8192) binary += String.fromCharCode(...bytes.subarray(i, i + 8192));
      const base64 = btoa(binary);

      const { data: { session } } = await supabase.auth.getSession();
      const token = session?.access_token;

      const res = await fetch(SUPABASE_URL + '/functions/v1/analyze-video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          videoBase64: base64, mimeType: videoBlob.type || 'video/webm',
          galloDescripcion: galloDesc,
          momentoEntrenamiento: momento,
          notas: notas
        })
      });
      const result = await res.json();
      if (!res.ok || result.error) { setError(result.error || 'Error al analizar'); setStep('preview'); return; }
      setAnalysis(result.analysis);
      setRawText(result.raw || '');
      setStep('result');
    } catch (e) {
      setError('Error: ' + e.message); setStep('preview');
    }
  };

  const MOMENTOS = [
    { value: 'inicio', label: '🟢 Inicio', desc: 'Gallo fresco' },
    { value: 'medio',  label: '🟡 Medio',  desc: '5-10 min' },
    { value: 'final',  label: '🔴 Final',  desc: '15+ min' },
  ];

  return (
    <div className="fixed inset-0 bg-black bg-opacity-90 z-50 flex flex-col">
      {/* Header */}
      <div className="bg-gray-900 text-white px-4 py-3 flex items-center justify-between flex-shrink-0">
        <div>
          <h3 className="font-bold">🎥 Análisis IA</h3>
          {selectedGallo && <p className="text-xs text-gray-400">{selectedGallo.nombre || ('#' + selectedGallo.numero_pinches)}</p>}
        </div>
        <button onClick={() => { stopCamera(); onClose(null); }} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-700 text-white">✕</button>
      </div>

      <div className="flex-1 overflow-y-auto">

        {/* SETUP */}
        {step === 'setup' && (
          <div className="p-4 space-y-4">
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800">
              <p className="font-semibold mb-1">Configura antes de grabar</p>
              <p className="text-xs">La IA usará esta info para identificar tu gallo correctamente.</p>
            </div>

            <div>
              <label className="text-sm font-medium text-gray-700 block mb-2">Gallo a analizar</label>
              <select value={selectedGallo?.id || ''} onChange={e => {
                const g = gallos.find(g => g.id === e.target.value) || null;
                setSelectedGallo(g);
                if (g) setGalloDesc((g.nombre || ('#' + g.numero_pinches)) + (g.color ? ', color ' + g.color : ''));
              }} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3">
                <option value="">-- Seleccionar gallo --</option>
                {gallos.filter(g => g.amarrado).map(g =>
                  <option key={g.id} value={g.id}>{g.nombre || ('#' + g.numero_pinches)}{g.color ? ' · ' + g.color : ''}</option>
                )}
              </select>
            </div>

            <div>
              <label className="text-sm font-medium text-gray-700 block mb-1">¿Cómo identificarlo en el video? *</label>
              <input type="text" value={galloDesc} onChange={e => setGalloDesc(e.target.value)}
                placeholder="ej: gallo colorado, el más grande, espuelas largas"
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
              <p className="text-xs text-gray-400 mt-1">Color u otro detalle que lo diferencie de la chata/muñeco</p>
            </div>

            <div>
              <label className="text-sm font-medium text-gray-700 block mb-2">Momento del entrenamiento</label>
              <div className="grid grid-cols-3 gap-2">
                {MOMENTOS.map(m => (
                  <button type="button" key={m.value} onClick={() => setMomento(m.value)}
                    className={`p-2 rounded-lg border text-center transition ${momento === m.value ? 'border-purple-500 bg-purple-50' : 'border-gray-200 bg-white'}`}>
                    <div className="text-sm font-medium">{m.label}</div>
                    <div className="text-xs text-gray-500">{m.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            <div>
              <label className="text-sm font-medium text-gray-700 block mb-1">Notas (opcional)</label>
              <textarea value={notas} onChange={e => setNotas(e.target.value)} rows={2}
                placeholder="ej: lesión en pata derecha, primer día de chata..."
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none" />
            </div>

            {error && <p className="text-red-600 text-sm bg-red-50 p-2 rounded">{error}</p>}

            <input ref={fileInputRef} type="file" accept="video/*" style={{display:'none'}} onChange={handleFileUpload} />
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => fileInputRef.current?.click()} disabled={!galloDesc.trim()}
                className="py-3 rounded-xl border-2 border-purple-300 text-purple-700 font-bold hover:bg-purple-50 disabled:opacity-40">
                📂 Subir video

              <button onClick={startCamera} disabled={!galloDesc.trim()}

                📹 Grabar ahora

            </div>
          </div>

        {/* COMPRESSING */}
        {step === 'compressing' && (
          <div className="flex flex-col items-center justify-center p-8 space-y-5" style={{minHeight:'60vh'}}>
            <div className="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center">
              <span className="text-4xl">⚙️</span>
            </div>
            <div className="text-center">
              <p className="font-bold text-gray-800 text-lg">Comprimiendo video...</p>
              <p className="text-gray-500 text-sm mt-1">Reduciendo el tamaño para enviarlo a la IA</p>
            </div>
            <div className="flex gap-1.5">
              {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay: i*0.2+'s'}} />)}
            </div>
          </div>
        )}

        {/* RECORDING */}
        {step === 'recording' && (
          <div className="relative bg-black" style={{minHeight:'70vh'}}>
            <video ref={videoRef} autoPlay muted playsInline className="w-full object-cover" style={{maxHeight:'70vh'}} />
            {recording && (
              <div className="absolute top-3 left-0 right-0 flex justify-center">
                <div className="bg-black bg-opacity-60 text-white px-3 py-1 rounded-full flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block" />
                  <span className="font-mono font-bold">{String(Math.floor(seconds/60)).padStart(2,'0')}:{String(seconds%60).padStart(2,'0')}</span>
                  <span className="text-xs text-gray-300">/ {MAX_SECONDS}s</span>
                </div>
              </div>
            )}
            {recording && (
              <div className="absolute bottom-24 left-4 right-4 bg-gray-700 rounded-full h-1.5">
                <div className="bg-red-500 h-1.5 rounded-full transition-all" style={{width: (seconds/MAX_SECONDS*100)+'%'}} />
              </div>
            )}
            <div className="absolute bottom-6 left-0 right-0 flex justify-center">
              {!recording
                ? <button onClick={startRecording} className="w-16 h-16 rounded-full bg-red-600 border-4 border-white shadow-xl flex items-center justify-center">
                    <span className="w-6 h-6 rounded-full bg-white" />
                  </button>
                : <button onClick={stopRecording} className="w-16 h-16 rounded-full bg-red-600 border-4 border-white shadow-xl flex items-center justify-center">
                    <span className="w-5 h-5 rounded bg-white" />
                  </button>
              }
            </div>
            {!recording && <p className="absolute top-3 right-3 text-white text-xs bg-black bg-opacity-50 px-2 py-1 rounded">Presiona para grabar</p>}
          </div>
        )}

        {/* PREVIEW */}
        {step === 'preview' && videoUrl && (
          <div className="p-4 space-y-4">
            <video src={videoUrl} controls playsInline className="w-full rounded-xl bg-black" style={{maxHeight:'55vh'}} />
            <div className="bg-gray-50 rounded-lg p-3 text-sm">
              <p className="text-gray-600">📦 Tamaño: <strong>{videoBlob ? (videoBlob.size/1024/1024).toFixed(1) : '?'}MB</strong>{videoBlob && videoBlob.size > 5*1024*1024 ? <span className="text-blue-600 text-xs ml-1">(se comprimirá auto)</span> : null}</p>
            </div>
            {error && <p className="text-red-600 text-sm bg-red-50 p-3 rounded-lg">{error}</p>}
            <div className="grid grid-cols-2 gap-3">
              <button onClick={retake} className="py-3 rounded-xl border border-gray-300 font-semibold text-gray-700 hover:bg-gray-50">🔄 Volver</button>
              <button onClick={analyzeVideo} className="py-3 rounded-xl bg-purple-600 text-white font-bold hover:bg-purple-700">🤖 Analizar con IA</button>
            </div>
          </div>
        )}

        {/* ANALYZING */}
        {step === 'analyzing' && (
          <div className="flex flex-col items-center justify-center p-8 space-y-5" style={{minHeight:'60vh'}}>
            <div className="w-20 h-20 rounded-full bg-purple-100 flex items-center justify-center">
              <span className="text-4xl animate-bounce">🤖</span>
            </div>
            <div className="text-center">
              <p className="font-bold text-gray-800 text-lg">Analizando el video...</p>
              <p className="text-gray-500 text-sm mt-1">Comprimiendo y enviando a Gemini AI...</p>
            </div>
            <div className="flex gap-1.5">
              {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full bg-purple-500 animate-bounce" style={{animationDelay: i*0.2+'s'}} />)}
            </div>
            <p className="text-xs text-gray-400 text-center">Puede tomar 15-30 segundos...</p>
          </div>
        )}

        {/* RESULT */}
        {step === 'result' && analysis && (
          <div className="p-4 space-y-4">

            {/* Índice General */}
            <div className="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl p-5 text-white text-center shadow-lg">
              <p className="text-sm font-medium opacity-75 mb-1">Índice General</p>

            </div>

            {/* Métricas de entrenamiento */}
            {analysis.training_metrics && (() => {
              const metricas = [
                ['Actividad', analysis.training_metrics.actividad_score],
                ['Velocidad', analysis.training_metrics.velocidad_score],
                ['Balance', analysis.training_metrics.balance_score],
                ['Coordinación', analysis.training_metrics.coordinacion_score],
                ['Simetría', analysis.training_metrics.simetria_score],
                ['Movilidad', analysis.training_metrics.movilidad_score],
                ['Recuperación', analysis.training_metrics.recuperacion_score],
                ['Cond. Física', analysis.training_metrics.condicion_fisica_score],
              ].filter(([, v]) => v !== null && v !== undefined);
              return metricas.length > 0 ? (
                <div className="bg-white rounded-xl border border-gray-200 p-4">
                  <p className="font-bold text-gray-800 mb-3 text-sm">📊 Métricas de Entrenamiento</p>
                  <div className="space-y-2.5">
                    {metricas.map(([label, val]) => (
                      <div key={label}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="text-gray-600">{label}</span>
                          <span className="font-bold text-gray-800">{val}/10</span>
                        </div>
                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full transition-all ${val >= 7 ? 'bg-green-500' : val >= 5 ? 'bg-yellow-400' : 'bg-red-400'}`}
                            style={{width: (val * 10) + '%'}} />
                        </div>
                      </div>
                    ))}
                    {analysis.training_metrics.fatiga_score !== null && analysis.training_metrics.fatiga_score !== undefined && (
                      <div>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="text-gray-600">Fatiga <span className="text-gray-400 text-[10px]">(↑ = más fatigado)</span></span>
                          <span className="font-bold text-gray-800">{analysis.training_metrics.fatiga_score}/10</span>
                        </div>
                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full ${analysis.training_metrics.fatiga_score <= 3 ? 'bg-green-500' : analysis.training_metrics.fatiga_score <= 6 ? 'bg-yellow-400' : 'bg-red-400'}`}
                            style={{width: (analysis.training_metrics.fatiga_score * 10) + '%'}} />
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ) : null;
            })()}

            {/* Rasgos del Gallo */}
            {analysis.rooster_traits && (() => {
              const traits = Object.entries(analysis.rooster_traits).filter(([, t]) => t.score !== null && t.score !== undefined);
              return traits.length > 0 ? (
                <div className="bg-white rounded-xl border border-gray-200 p-4">
                  <p className="font-bold text-gray-800 mb-3 text-sm">🐓 Rasgos del Gallo</p>
                  <div className="space-y-2.5">
                    {traits.map(([key, trait]) => (
                      <div key={key}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="text-gray-600 capitalize">{key}</span>
                          <span className="font-bold text-gray-800">{trait.score}/10 <span className="text-gray-400 font-normal">({trait.confianza}%)</span></span>
                        </div>
                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full ${trait.score >= 7 ? 'bg-purple-500' : trait.score >= 5 ? 'bg-blue-400' : 'bg-gray-400'}`}
                            style={{width: (trait.score * 10) + '%'}} />
                        </div>
                        {trait.evidencia && <p className="text-[10px] text-gray-400 mt-0.5 italic">{trait.evidencia}</p>}
                      </div>
                    ))}
                  </div>
                </div>
              ) : null;
            })()}

            {/* Alertas */}
            {analysis.alerts && analysis.alerts.length > 0 && (
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-4">
                <p className="font-bold text-orange-800 mb-2 text-sm">⚠️ Alertas</p>
                <div className="space-y-1">
                  {analysis.alerts.map((a, i) => <p key={i} className="text-sm text-orange-700">• {a}</p>)}
                </div>
              </div>
            )}

            {/* Puntos fuertes / a observar */}
            {analysis.training_metrics && (analysis.training_metrics.puntos_fuertes?.length > 0 || analysis.training_metrics.puntos_a_observar?.length > 0) && (
              <div className="grid grid-cols-2 gap-3">
                {analysis.training_metrics.puntos_fuertes?.length > 0 && (
                  <div className="bg-green-50 border border-green-100 rounded-xl p-3">
                    <p className="text-xs font-bold text-green-800 mb-1.5">✅ Fortalezas</p>
                    {analysis.training_metrics.puntos_fuertes.map((p, i) => <p key={i} className="text-xs text-green-700 leading-snug">• {p}</p>)}
                  </div>
                )}
                {analysis.training_metrics.puntos_a_observar?.length > 0 && (
                  <div className="bg-yellow-50 border border-yellow-100 rounded-xl p-3">
                    <p className="text-xs font-bold text-yellow-800 mb-1.5">👀 A Observar</p>
                    {analysis.training_metrics.puntos_a_observar.map((p, i) => <p key={i} className="text-xs text-yellow-700 leading-snug">• {p}</p>)}
                  </div>
                )}
              </div>
            )}

            {/* Resumen */}
            {analysis.summary?.resumen_general && (
              <div className="bg-gray-50 rounded-xl p-4">
                <p className="font-bold text-gray-700 mb-2 text-sm">📝 Resumen</p>
                <p className="text-sm text-gray-700 leading-relaxed">{analysis.summary.resumen_general}</p>
              </div>
            )}

            <div className="space-y-2 pb-2">
              <button onClick={() => { stopCamera(); onClose({ analysis, gallo: selectedGallo, raw: rawText }); }}
                className="w-full py-3 rounded-xl bg-green-600 text-white font-bold hover:bg-green-700">
                💾 Guardar en entrenamiento
              </button>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={retake} className="py-3 rounded-xl border border-gray-300 font-semibold text-gray-700 text-sm hover:bg-gray-50">🎥 Nuevo video</button>
                <button onClick={() => { stopCamera(); onClose(null); }} className="py-3 rounded-xl border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">✕ Cerrar</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
};

// MÓDULO: ENTRENAMIENTOS

const EntrenamientosModule = () => {
  const { gallos, opciones, addOpcion, toast, activeOwnerId, canEdit } = useContext(AppContext);
  const [entrenamientos, setEntrenamientos] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [galloFilter, setGalloFilter] = useState(null);
  const [showDetalle, setShowDetalle] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showVideoAnalysis, setShowVideoAnalysis] = useState(false);

  const nutricionOpts = opciones['nutricion'] || [];
  const [nuevaNut, setNuevaNut] = useState('');

  const emptyForm = {
    gallo_id: null, fecha: new Date().toISOString().split('T')[0],
    peso_libras: '', peso_onzas: '0', corrida: '', chata: '',
    clima: 'Soleado', temperatura: '', tomo_sol: 'No', intensidad: 'Medio',
    animo_gallo: 'Normal', condicion_plumeras_general: 'Buena',
    condicion_plumeras_alas: 'Buena', condicion_plumeras_rabos: 'Buena',
    problemas_alas: 'No', condicion_pico: 'Normal', condicion_espuelas: 'Sanas',
    nutricion_items: [], desparasitante: '', medicinas_especiales: '', alimentacion_especial: '',
    desempeno_general: 'Bueno', velocidad: 'Normal', resistencia: 'Buena', razon_malo: '', observaciones: '',
    fotos: [],
    ai_training_metrics: null, ai_rooster_traits: null, ai_summary: null, ai_raw: null, ai_indice_general: null
  };
  const [form, setForm] = useState(emptyForm);
  const [weekOffset, setWeekOffset] = useState(0);
  const [galloSelected, setGalloSelected] = useState(null);

  // Calcular rango de semana basado en offset
  const getWeekRange = (offset) => {
    const now = new Date();
    const dayOfWeek = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1) + (offset * 7));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return { start: monday, end: sunday };
  };

  const weekRange = useMemo(() => getWeekRange(weekOffset), [weekOffset]);
  const weekLabel = useMemo(() => {
    const s = weekRange.start;
    const e = weekRange.end;
    const fmt = (d) => `${d.getDate()}/${d.getMonth()+1}`;
    if (weekOffset === 0) return `Esta semana (${fmt(s)} - ${fmt(e)})`;
    if (weekOffset === -1) return `Semana pasada (${fmt(s)} - ${fmt(e)})`;
    return `${fmt(s)} - ${fmt(e)}`;
  }, [weekRange, weekOffset]);

  const loadEntrenamientos = async () => {
    setLoading(true);
    const startStr = weekRange.start.toISOString().split('T')[0];
    const endStr = weekRange.end.toISOString().split('T')[0];
    let query = supabase.from('entrenamientos').select('*, gallos(nombre, numero_pinches, foto)')
      .gte('fecha', startStr).lte('fecha', endStr)
      .order('fecha', { ascending: false });
    if (galloFilter) query = query.eq('gallo_id', galloFilter.id);
    const { data, error } = await query;
    if (!error) setEntrenamientos(data || []);
    setLoading(false);
  };

  useEffect(() => { loadEntrenamientos(); }, [galloFilter, weekOffset]);

  const handleSave = async () => {
    if (!form.gallo_id) { toast('Selecciona un gallo', 'error'); return; }
    if (!form.peso_libras) { toast('El peso es requerido', 'error'); return; }

    const data = {
      ...form,
      peso_libras: parseInt(form.peso_libras),
      peso_onzas: parseInt(form.peso_onzas) || 0,
      corrida: form.corrida ? parseFloat(form.corrida) : null,
      chata: form.chata ? parseFloat(form.chata) : null,
      temperatura: form.temperatura ? parseFloat(form.temperatura) : null,
    };

    const dataConUser = { ...data, user_id: activeOwnerId };
    let error;
    if (editingId) {
      const { created_at, updated_at, gallos: _g, user_id: _u, ...cleanData } = dataConUser;
      ({ error } = await supabase.from('entrenamientos').update(cleanData).eq('id', editingId));
    } else {
      ({ error } = await supabase.from('entrenamientos').insert(dataConUser));
    }

    if (error) { toast(error.message, 'error'); return; }
    toast(editingId ? 'Entrenamiento actualizado' : 'Entrenamiento registrado', 'success');
    setShowForm(false);
    setEditingId(null);
    setForm(emptyForm);
    setGalloSelected(null);
    loadEntrenamientos();
  };

  const handleDelete = async (id) => {
    if (!confirm('¿Eliminar este entrenamiento?')) return;
    await supabase.from('entrenamientos').delete().eq('id', id);
    toast('Eliminado', 'success');
    loadEntrenamientos();
  };

  const handleEdit = (ent) => {
    const gallo = gallos.find(g => g.id === ent.gallo_id);
    setGalloSelected(gallo || null);
    setForm({ ...ent });
    setEditingId(ent.id);
    setShowForm(true);
  };

  const toggleNut = (n) => {
    setForm(f => ({
      ...f,
      nutricion_items: f.nutricion_items.includes(n)
        ? f.nutricion_items.filter(x => x !== n)
        : [...f.nutricion_items, n]
    }));
  };

  const desempenoColor = (d) => {
    if (d === 'Excelente') return 'bg-green-100 text-green-800';
    if (d === 'Bueno') return 'bg-blue-100 text-blue-800';
    if (d === 'Regular') return 'bg-yellow-100 text-yellow-800';

// MÓDULO: PELEAS

const PeleasModule = () => {
  const { gallos, opciones, addOpcion, toast, activeOwnerId, canEdit } = useContext(AppContext);
  const [peleas, setPeleas] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showDetalle, setShowDetalle] = useState(null);
  const [loading, setLoading] = useState(true);
  const [temporadasDisp, setTemporadasDisp] = useState([1]);
  const [viewingTemp, setViewingTemp] = useState(null);

  const comoFueOpts = opciones['como_fue'] || [];
  const estiloOpts = opciones['estilos_oponente'] || [];

  const getTemporadaActual = () => {
    const stored = localStorage.getItem('temporada_actual_' + activeOwnerId);
    return stored ? parseInt(stored) : 1;
  };

  const emptyForm = {
    gallo_id: null, fecha: new Date().toISOString().split('T')[0], lugar: '',
    duenio_oponente: '', peso_oponente_libras: '', peso_oponente_onzas: '', estilo_oponente: '',
    armador: '', resultado: 'Ganó', duracion: '', duracion_segundos: '0', dinero_jugado: '',
    como_fue: '', estilo_observado: '', puntos_positivos: '', puntos_negativos: '', lesiones: ''
  };
  const [form, setForm] = useState(emptyForm);
  const [galloSelected, setGalloSelected] = useState(null);

  const loadPeleas = async () => {
    setLoading(true);
    const { data } = await supabase.from('peleas')
      .select('*, gallos(nombre, numero_pinches)')
      .eq('user_id', activeOwnerId)
      .order('fecha', { ascending: false })
      .limit(500);
    if (data) {
      setPeleas(data);
      const temps = [...new Set(data.map(p => p.temporada || 1))].sort((a, b) => a - b);
      if (temps.length === 0) temps.push(1);
      setTemporadasDisp(temps);
      const current = getTemporadaActual();
      setViewingTemp(current);
    }
    setLoading(false);
  };

  useEffect(() => { loadPeleas(); }, [activeOwnerId]);

  // Peleas de la temporada que se está viendo
  const peleasActuales = peleas.filter(p => (p.temporada || 1) === (viewingTemp || 1));
  const lugaresUnicos = [...new Set(peleas.filter(p => p.lugar).map(p => p.lugar))];

  const handleNuevaTemporada = () => {
    const current = getTemporadaActual();
    const maxEnDB = peleas.length > 0 ? Math.max(...peleas.map(p => p.temporada || 1)) : 1;
    const next = Math.max(current, maxEnDB) + 1;
    if (!confirm(`¿Iniciar Temporada ${next}?\n\nLas peleas de la Temporada ${current} quedarán guardadas y podrás consultarlas cuando quieras.`)) return;
    localStorage.setItem('temporada_actual_' + activeOwnerId, String(next));
    setViewingTemp(next);
    setTemporadasDisp(prev => prev.includes(next) ? prev : [...prev, next].sort((a, b) => a - b));
    toast(`¡Temporada ${next} iniciada! 🎉`);
  };

  const handleSave = async () => {
    if (!form.gallo_id) { toast('Selecciona un gallo', 'error'); return; }
    if (!form.resultado) { toast('El resultado es requerido', 'error'); return; }

    const data = {
      ...form,
      peso_oponente_libras: form.peso_oponente_libras ? parseInt(form.peso_oponente_libras) : null,
      peso_oponente_onzas: form.peso_oponente_onzas ? parseInt(form.peso_oponente_onzas) : null,
      duracion: form.duracion ? parseInt(form.duracion) : null,
      duracion_segundos: form.duracion_segundos ? parseInt(form.duracion_segundos) : 0,
      dinero_jugado: form.dinero_jugado ? parseFloat(form.dinero_jugado) : null,
      moneda: 'USD',
    };

    const dataConUser = { ...data, user_id: activeOwnerId, temporada: getTemporadaActual() };
    let error;
    if (editingId) {
      const { created_at, updated_at, gallos: _g, user_id: _u, ...cleanData } = dataConUser;
      ({ error } = await supabase.from('peleas').update(cleanData).eq('id', editingId));
    } else {
      ({ error } = await supabase.from('peleas').insert(dataConUser));
    }

    if (error) { toast(error.message, 'error'); return; }
    toast(editingId ? 'Pelea actualizada' : 'Pelea registrada', 'success');
    setShowForm(false); setEditingId(null); setForm(emptyForm); setGalloSelected(null);
    loadPeleas();
  };

  const handleDelete = async (id) => {
    if (!confirm('¿Eliminar esta pelea?')) return;
    await supabase.from('peleas').delete().eq('id', id);
    toast('Eliminada', 'success');
    loadPeleas();
  };

  const handleEdit = (p) => {
    const gallo = gallos.find(g => g.id === p.gallo_id);
    setGalloSelected(gallo || null);
    setForm({ ...p });
    setEditingId(p.id);
    setShowForm(true);
  };

  // Stats de la temporada actual
  const totalGanadas = peleasActuales.filter(p => p.resultado === 'Ganó').length;
  const totalPerdidas = peleasActuales.filter(p => p.resultado === 'Perdió').length;
  const totalDinero = peleasActuales.reduce((sum, p) => {
    if (p.resultado === 'Ganó') return sum + (parseFloat(p.dinero_jugado) || 0);
    return sum - (parseFloat(p.dinero_jugado) || 0);
  }, 0);

  const temporadaActual = getTemporadaActual();
  const isViewingCurrent = viewingTemp === temporadaActual;

  return (
    <div className="fade-in">
      {/* Header */}
      <div className="flex items-center justify-between mb-3">
        <div>
          <h2 className="text-xl font-bold text-gray-800">Peleas</h2>
          <p className="text-sm text-gray-500">{peleasActuales.length} en esta temporada</p>
        </div>
        <div className="flex gap-2">
          {canEdit && isViewingCurrent && (
            <button onClick={handleNuevaTemporada}
              className="bg-amber-500 text-white px-3 py-2 rounded-lg font-medium text-xs hover:bg-amber-600">
              🔄 Nueva Temporada
            </button>
          )}
          {canEdit && isViewingCurrent && (
            <button onClick={() => { setForm(emptyForm); setEditingId(null); setGalloSelected(null); setShowForm(true); }}
              className="bg-purple-600 text-white px-4 py-2.5 rounded-lg font-medium text-sm hover:bg-purple-700">
              + Nueva Pelea
            </button>
          )}
        </div>
      </div>

      {/* Selector de temporadas */}
      {(temporadasDisp.length > 1 || !isViewingCurrent) && (
        <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">
          {temporadasDisp.map(t => (
            <button key={t} onClick={() => setViewingTemp(t)}
              className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition ${
                viewingTemp === t
                  ? 'bg-purple-600 text-white'
                  : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
              }`}>
              T{t}{t === temporadaActual ? ' ⭐' : ''}
            </button>
          ))}
        </div>
      )}

      {/* Stats */}
      {peleasActuales.length > 0 && (
        <div className="grid grid-cols-3 gap-2 mb-4">
          <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-green-700">{totalGanadas}</p>
            <p className="text-xs text-green-600">Ganadas</p>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-red-700">{totalPerdidas}</p>
            <p className="text-xs text-red-600">Perdidas</p>
          </div>
          <div className={`${totalDinero >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} border rounded-lg p-3 text-center`}>
            <p className={`text-2xl font-bold ${totalDinero >= 0 ? 'text-green-700' : 'text-red-700'}`}>${Math.abs(totalDinero).toFixed(0)}</p>
            <p className={`text-xs ${totalDinero >= 0 ? 'text-green-600' : 'text-red-600'}`}>{totalDinero >= 0 ? 'Ganancia' : 'Pérdida'}</p>
          </div>
        </div>
      )}

      {/* Lista */}
      {loading ? <p className="text-center text-gray-400 py-8">Cargando...</p> : (
        <div className="space-y-2">
          {peleasActuales.length === 0 ? (
            <div className="text-center py-12">
              <p className="text-gray-400 mb-2">No hay peleas en esta temporada</p>
              {isViewingCurrent && canEdit && (
                <button onClick={() => { setForm(emptyForm); setEditingId(null); setGalloSelected(null); setShowForm(true); }}
                  className="text-purple-600 text-sm font-medium hover:underline">+ Registrar primera pelea</button>
              )}
            </div>
          ) : peleasActuales.map(p => (
            <div key={p.id} className={`rounded-lg border p-3 ${p.resultado === 'Ganó' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}
              onClick={() => setShowDetalle(p)}>
              <div className="flex items-center justify-between">
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="font-medium text-sm text-gray-800">{p.gallos?.nombre || '#' + p.gallos?.numero_pinches}</span>
                    <span className={`text-xs font-bold ${p.resultado === 'Ganó' ? 'text-green-700' : 'text-red-700'}`}>{p.resultado === 'Ganó' ? '✅' : '❌'} {p.resultado}</span>
                  </div>
                  <p className="text-xs text-gray-500 mt-0.5">
                    {p.fecha} {p.lugar ? `• ${p.lugar}` : ''} {(p.duracion || p.duracion_segundos) ? `• ${p.duracion ? p.duracion + ':' + String(p.duracion_segundos||0).padStart(2,'0') : p.duracion_segundos + 'seg'}` : ''} {p.dinero_jugado ? `• $${p.dinero_jugado}` : ''}
                  </p>
                  {p.como_fue && <span className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded mt-1 inline-block">{p.como_fue}</span>}
                </div>
                <div className="flex gap-1">
                  {canEdit && <button onClick={(ev) => { ev.stopPropagation(); handleEdit(p); }} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/50 text-sm">✏️</button>}
                  {canEdit && <button onClick={(ev) => { ev.stopPropagation(); handleDelete(p.id); }} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/50 text-sm">🗑</button>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal Detalle */}
      {showDetalle && (
        <Modal title="Detalle Pelea" onClose={() => setShowDetalle(null)}>
          {(() => { const p = showDetalle; return (
            <div className="space-y-3 text-sm">
              <div className={`p-3 rounded-lg text-center ${p.resultado === 'Ganó' ? 'bg-green-100' : 'bg-red-100'}`}>
                <p className="text-2xl font-bold">{p.resultado === 'Ganó' ? '✅ GANÓ' : '❌ PERDIÓ'}</p>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div><span className="text-gray-500">Gallo:</span> <span className="font-medium">{p.gallos?.nombre}</span></div>
                <div><span className="text-gray-500">Fecha:</span> <span className="font-medium">{p.fecha}</span></div>
                <div><span className="text-gray-500">Lugar:</span> <span className="font-medium">{p.lugar || 'N/A'}</span></div>
                <div><span className="text-gray-500">Duración:</span> <span className="font-medium">{p.duracion ? p.duracion + ':' + String(p.duracion_segundos||0).padStart(2,'0') : (p.duracion_segundos ? p.duracion_segundos + ' seg' : 'N/A')}</span></div>
                <div><span className="text-gray-500">Dinero:</span> <span className="font-medium">${p.dinero_jugado || 0}</span></div>
                <div><span className="text-gray-500">Cómo fue:</span> <span className="font-medium">{p.como_fue || 'N/A'}</span></div>
                <div><span className="text-gray-500">Oponente:</span> <span className="font-medium">{p.duenio_oponente || 'N/A'}</span></div>
                <div><span className="text-gray-500">Peso Op.:</span> <span className="font-medium">{p.peso_oponente_libras || '?'}lb {p.peso_oponente_onzas || 0}oz</span></div>
                <div><span className="text-gray-500">Estilo Op.:</span> <span className="font-medium">{p.estilo_oponente || 'N/A'}</span></div>
                <div><span className="text-gray-500">Armador:</span> <span className="font-medium">{p.armador || 'N/A'}</span></div>
              </div>
              {p.estilo_observado && <div className="border-t pt-2"><p className="text-gray-500">Estilo observado: <span className="text-gray-800">{p.estilo_observado}</span></p></div>}
              {p.puntos_positivos && <div className="border-t pt-2"><p className="text-gray-500">Positivo: <span className="text-green-700">{p.puntos_positivos}</span></p></div>}
              {p.puntos_negativos && <div className="border-t pt-2"><p className="text-gray-500">Negativo: <span className="text-red-700">{p.puntos_negativos}</span></p></div>}
              {p.lesiones && <div className="border-t pt-2"><p className="text-gray-500">Lesiones: <span className="text-red-700">{p.lesiones}</span></p></div>}
            </div>
          ); })()}
        </Modal>
      )}

      {/* Modal Formulario */}
      {showForm && (
        <Modal title={editingId ? 'Editar Pelea' : 'Nueva Pelea'} onClose={() => setShowForm(false)}>
          <div className="space-y-4">
            <Field label="Gallo (amarrado)" required>
              <GalloSearch gallos={gallos} selected={galloSelected}
                onSelect={g => { setGalloSelected(g); setForm(f => ({...f, gallo_id: g.id})); }}
                onClear={() => { setGalloSelected(null); setForm(f => ({...f, gallo_id: null})); }}
                filter={g => g.amarrado} placeholder="Buscar gallo amarrado..." />
            </Field>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Fecha" required><Input type="date" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} /></Field>
              <Field label="Lugar">
                <Input type="text" placeholder="ej: Gallera..." value={form.lugar} onChange={e => setForm({...form, lugar: e.target.value})}
                  list="lugares-list" />
                <datalist id="lugares-list">{lugaresUnicos.map(l => <option key={l} value={l} />)}</datalist>
              </Field>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Dueño Oponente"><Input type="text" value={form.duenio_oponente} onChange={e => setForm({...form, duenio_oponente: e.target.value})} /></Field>
              <Field label="Armador"><Input type="text" value={form.armador} onChange={e => setForm({...form, armador: e.target.value})} /></Field>
            </div>

            <div className="grid grid-cols-3 gap-3">
              <Field label="Peso Op. (lb)"><Input type="number" value={form.peso_oponente_libras} onChange={e => setForm({...form, peso_oponente_libras: e.target.value})} /></Field>
              <Field label="Peso Op. (oz)"><Input type="number" min="0" max="15" value={form.peso_oponente_onzas} onChange={e => setForm({...form, peso_oponente_onzas: e.target.value})} /></Field>
              <Field label="Estilo Op.">
                <Select value={form.estilo_oponente} onChange={e => setForm({...form, estilo_oponente: e.target.value})}
                  options={[{value: '', label: 'Seleccionar...'}, ...estiloOpts]} />
              </Field>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Resultado" required>
                <Select value={form.resultado} onChange={e => setForm({...form, resultado: e.target.value})}
                  options={[{value:'Ganó',label:'✅ Ganó'},{value:'Perdió',label:'❌ Perdió'}]} />
              </Field>
              <Field label="Dinero (USD)">
                <Input type="number" placeholder="$" value={form.dinero_jugado} onChange={e => setForm({...form, dinero_jugado: e.target.value})} />
              </Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Duración (min)"><Input type="number" placeholder="0" value={form.duracion} onChange={e => setForm({...form, duracion: e.target.value})} /></Field>
              <Field label="Segundos"><Input type="number" placeholder="0" min="0" max="59" value={form.duracion_segundos} onChange={e => setForm({...form, duracion_segundos: e.target.value})} /></Field>
            </div>

            <div className="border-t pt-3">
              <p className="text-sm font-medium text-gray-700 mb-2">¿Cómo fue?</p>
              <div className="flex flex-wrap gap-1.5">
                {comoFueOpts.map(c => (
                  <button key={c} onClick={() => setForm({...form, como_fue: c})}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition ${
                      form.como_fue === c ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'
                    }`}>{c}</button>
                ))}
              </div>
            </div>

            <Field label="Estilo Observado"><Input type="text" placeholder="¿Cómo peleó nuestro gallo?" value={form.estilo_observado} onChange={e => setForm({...form, estilo_observado: e.target.value})} /></Field>
            <Field label="Puntos Positivos"><Textarea placeholder="¿Qué hizo bien?" value={form.puntos_positivos} onChange={e => setForm({...form, puntos_positivos: e.target.value})} /></Field>
            <Field label="Puntos Negativos"><Textarea placeholder="¿Qué faltó?" value={form.puntos_negativos} onChange={e => setForm({...form, puntos_negativos: e.target.value})} /></Field>
            <Field label="Lesiones"><Textarea placeholder="Descripción de lesiones..." value={form.lesiones} onChange={e => setForm({...form, lesiones: e.target.value})} /></Field>

            {canEdit && <button onClick={handleSave} className="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700">
              {editingId ? 'Actualizar' : 'Guardar'} Pelea
            </button>}
          </div>
        </Modal>
      )}
    </div>
  );
};

// ============================================
// MÓDULO: DASHBOARD
// ============================================
const DashboardModule = () => {
  const { gallos, toast } = useContext(AppContext);
  const [selected, setSelected] = useState(null);
  const [entrenamientos, setEntrenamientos] = useState([]);
  const [peleas, setPeleas] = useState([]);
  const [showArbol, setShowArbol] = useState(false);
  const [showFicha, setShowFicha] = useState(false);
  const [showAllEnts, setShowAllEnts] = useState(false);
  const [showAllPels, setShowAllPels] = useState(false);
  const [showDetEnt, setShowDetEnt] = useState(null);
  const [showDetPel, setShowDetPel] = useState(null);
  const [viewingPhoto, setViewingPhoto] = useState(null);
  const topRef = useRef(null);

  const loadData = async (gallo) => {
    setSelected(gallo);
    setTimeout(() => topRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    const [{ data: ents }, { data: pels }] = await Promise.all([
      supabase.from('entrenamientos').select('*').eq('gallo_id', gallo.id).order('fecha', { ascending: false }).limit(50),
      supabase.from('peleas').select('*').eq('gallo_id', gallo.id).order('fecha', { ascending: false }).limit(50),
    ]);
    setEntrenamientos(ents || []);
    setPeleas(pels || []);
  };

  const padre = selected ? gallos.find(g => g.id === selected.padre_id) : null;
  const madre = selected ? gallos.find(g => g.id === selected.madre_id) : null;
  const ganadas = peleas.filter(p => p.resultado === 'Ganó').length;
  const perdidas = peleas.filter(p => p.resultado === 'Perdió').length;

  const desempenoColor = (d) => {
    if (d === 'Excelente') return 'bg-green-100 text-green-800';
    if (d === 'Bueno') return 'bg-blue-100 text-blue-800';
    if (d === 'Regular') return 'bg-yellow-100 text-yellow-800';
    return 'bg-red-100 text-red-800';
  };

  return (
    <div className="fade-in">
      <h2 className="text-xl font-bold text-gray-800 mb-1">Dashboard</h2>
      <p className="text-sm text-gray-500 mb-4">Busca un gallo para ver toda su información</p>

      <div ref={topRef} />
      <GalloSearch gallos={gallos} selected={selected}
        onSelect={loadData} onClear={() => { setSelected(null); setEntrenamientos([]); setPeleas([]); }}
        placeholder="Buscar gallo por nombre o pinches..." />

      {selected && (
        <div className="mt-4 space-y-4">
          {/* Info general */}
          <div className="bg-white rounded-lg border border-gray-200 p-4">
            <div className="flex items-start justify-between">
              <div className="flex items-start gap-3">
                {selected.foto && <img src={selected.foto} className="w-16 h-16 rounded-lg object-cover flex-shrink-0 cursor-pointer" onClick={() => setViewingPhoto(selected.foto)} />}
                <div>
                  <h3 className="text-lg font-bold text-gray-800">{selected.nombre || 'Sin nombre'}</h3>
                  <p className="text-sm text-gray-500">
                    {selected.numero_pinches ? `#${selected.numero_pinches} • ` : ''}{selected.sexo} • {selected.linea_genetica || 'Sin línea'}
                    {selected.color ? ` • ${selected.color}` : ''}
                  </p>
                </div>
              </div>
              {selected.amarrado && <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">AMARRADO</span>}
            </div>

            <div className="grid grid-cols-2 gap-3 mt-3">
              <div className="text-sm"><span className="text-gray-500">Padre:</span> <span className="font-medium">{padre ? (padre.nombre || '#' + padre.numero_pinches) : 'Desconocido'}</span></div>
              <div className="text-sm"><span className="text-gray-500">Madre:</span> <span className="font-medium">{madre ? (madre.nombre || '#' + madre.numero_pinches) : 'Desconocida'}</span></div>
            </div>

            {selected.caracteristicas && selected.caracteristicas.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-3">
                {selected.caracteristicas.map(c => <span key={c} className="text-xs bg-orange-50 text-orange-700 px-2 py-0.5 rounded">{c}</span>)}
              </div>
            )}

            {selected.amarrado && (
              <div className="grid grid-cols-3 gap-2 mt-3">
                <div className="bg-blue-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-blue-700">{entrenamientos.length}</p>
                  <p className="text-[10px] text-blue-600">Entrenamientos</p>
                </div>
                <div className="bg-green-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-green-700">{ganadas}</p>
                  <p className="text-[10px] text-green-600">Ganadas</p>
                </div>
                <div className="bg-red-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-red-700">{perdidas}</p>
                  <p className="text-[10px] text-red-600">Perdidas</p>
                </div>
              </div>
            )}

            <div className="mt-3 grid grid-cols-2 gap-2">
              <button onClick={() => setShowFicha(true)} className="bg-orange-50 text-orange-700 border border-orange-200 py-2 rounded-lg text-sm font-semibold hover:bg-orange-100">
                🧬 Ficha Completa
              </button>
              <button onClick={() => setShowArbol(true)} className="bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-200">
                🌳 Árbol Genealógico
              </button>
            </div>
          </div>

          {/* Entrenamientos recientes */}
          {selected.amarrado && (
            <div className="bg-white rounded-lg border border-gray-200 p-4">
              <div className="flex justify-between items-center mb-3">
                <h4 className="font-bold text-gray-800">Entrenamientos</h4>
                {entrenamientos.length > 5 && (
                  <button onClick={() => setShowAllEnts(true)} className="text-xs text-blue-600 font-semibold hover:underline">
                    Ver todos ({entrenamientos.length}) →
                  </button>
                )}
              </div>
              {entrenamientos.length === 0 ? <p className="text-sm text-gray-400">Sin entrenamientos</p> : (
                <div className="space-y-1.5">
                  {entrenamientos.slice(0, 5).map(e => (
                    <div key={e.id} className="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0 cursor-pointer hover:bg-gray-50 -mx-1 px-1 rounded"
                      onClick={() => setShowDetEnt(e)}>
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-gray-500 w-20">{e.fecha}</span>
                        <span className="text-xs font-medium">{e.peso_libras}lb {e.peso_onzas}oz</span>
                        {e.corrida && <span className="text-xs text-gray-400">{e.corrida}' corr</span>}{e.chata && <span className="text-xs text-blue-400 ml-1">{e.chata}' chat</span>}
                      </div>
                      <div className="flex items-center gap-1 flex-shrink-0">
                        {e.ai_indice_general != null && <span className="text-[10px] px-1.5 py-0.5 rounded font-bold bg-purple-100 text-purple-700">🤖 {e.ai_indice_general}</span>}
                        <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${desempenoColor(e.desempeno_general)}`}>{e.desempeno_general}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Peleas recientes */}
          {selected.amarrado && (
            <div className="bg-white rounded-lg border border-gray-200 p-4">
              <div className="flex justify-between items-center mb-3">
                <h4 className="font-bold text-gray-800">Historial de Peleas</h4>
                {peleas.length > 5 && (
                  <button onClick={() => setShowAllPels(true)} className="text-xs text-purple-600 font-semibold hover:underline">
                    Ver todas ({peleas.length}) →
                  </button>
                )}
              </div>
              {peleas.length === 0 ? <p className="text-sm text-gray-400">Sin peleas</p> : (
                <div className="space-y-1.5">
                  {peleas.slice(0, 5).map(p => (
                    <div key={p.id} className={`flex items-center justify-between py-1.5 px-2 rounded cursor-pointer ${p.resultado === 'Ganó' ? 'bg-green-50 hover:bg-green-100' : 'bg-red-50 hover:bg-red-100'}`}
                      onClick={() => setShowDetPel(p)}>
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-bold">{p.resultado === 'Ganó' ? '✅' : '❌'}</span>
                        <span className="text-xs text-gray-500">{p.fecha}</span>
                        <span className="text-xs">{p.duracion ? `${p.duracion}:${String(p.duracion_segundos||0).padStart(2,'0')}` : (p.duracion_segundos ? `${p.duracion_segundos}seg` : '')}</span>
                      </div>
                      <div className="flex items-center gap-2">
                        {p.como_fue && <span className="text-[10px] text-purple-600">{p.como_fue}</span>}
                        <span className="text-xs font-medium">${p.dinero_jugado || 0}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* SECCIÓN GALLOS AMARRADOS */}
      {(() => {
        const amarrados = gallos.filter(g => g.amarrado);
        if (amarrados.length === 0) return null;
        return (
          <div className="mt-6">
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px bg-gray-200 flex-1" />
              <span className="text-sm font-bold text-red-700 uppercase tracking-wider">Gallos Amarrados ({amarrados.length})</span>
              <div className="h-px bg-gray-200 flex-1" />
            </div>
            <div className="space-y-2">
              {amarrados.map(g => {
                const pa = gallos.find(x => x.id === g.padre_id);
                const ma = gallos.find(x => x.id === g.madre_id);
                return (
                  <div key={g.id} className="bg-white rounded-lg border border-gray-200 p-3 cursor-pointer hover:border-red-300 active:bg-gray-50 transition"
                    onClick={() => loadData(g)}>
                    <div className="flex items-start justify-between">
                      {g.foto && <img src={g.foto} className="w-14 h-14 rounded-lg object-cover mr-3 flex-shrink-0 cursor-pointer" onClick={(e) => { e.stopPropagation(); setViewingPhoto(g.foto); }} />}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-gray-800">{g.nombre || 'Sin nombre'}</span>
                          {g.numero_pinches && <span className="text-xs bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">#{g.numero_pinches}</span>}
                          <span className="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-medium">Amarrado{g.jaula ? ` • Jaula ${g.jaula}` : ''}</span>
                          <span className="text-xs text-gray-400">{g.sexo === 'Gallina' ? '♀' : '♂'}</span>

                    <div className="grid grid-cols-2 gap-2 mt-2">
                      {e.ai_training_metrics.puntos_fuertes?.length > 0 && (

      {/* Detalle pelea */}
      {showDetPel && (
        <Modal title="Detalle Pelea" onClose={() => setShowDetPel(null)}>

              <div><span className="text-gray-500">Fecha:</span> {showDetPel.fecha}</div>
              <div><span className="text-gray-500">Lugar:</span> {showDetPel.lugar || 'N/A'}</div>
              <div><span className="text-gray-500">Duración:</span> {showDetPel.duracion ? showDetPel.duracion + ':' + String(showDetPel.duracion_segundos||0).padStart(2,'0') : (showDetPel.duracion_segundos ? showDetPel.duracion_segundos + ' seg' : 'N/A')}</div>

            {showDetPel.puntos_negativos && <p className="text-red-700">- {showDetPel.puntos_negativos}</p>}
            {showDetPel.lesiones && <p className="border-t pt-2 text-red-700">Lesiones: {showDetPel.lesiones}</p>}

        </Modal>
      )}
      <PhotoViewer src={viewingPhoto} onClose={() => setViewingPhoto(null)} />

const AdminModal = ({ onClose, user }) => {
  const [usuarios, setUsuarios] = useState([]);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [nombre, setNombre] = useState('');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');
  const [msgType, setMsgType] = useState('error');

  const load = async () => {
    const { data } = await supabase.from('memberships')
      .select('*').eq('owner_id', user.id).eq('role', 'app_user')
      .order('created_at', { ascending: false });
    setUsuarios(data || []);
  };
  useEffect(() => { load(); }, []);

  const handleCreate = async () => {
    if (!email.trim() || !password.trim()) { setMsg('Email y contraseña son requeridos'); setMsgType('error'); return; }
    if (password.length < 6) { setMsg('Contraseña mínimo 6 caracteres'); setMsgType('error'); return; }
    if (usuarios.some(u => u.collaborator_email === email.trim().toLowerCase())) {
      setMsg('Ese email ya tiene cuenta.'); setMsgType('error'); return;
    }
    setSaving(true); setMsg('');
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ email: email.trim().toLowerCase(), password: password.trim(), role: 'app_user', owner_id: user.id })
      });
      const result = await res.json();
      if (!res.ok) { setMsg(result.error || 'Error al crear usuario'); setMsgType('error'); setSaving(false); return; }
      if (nombre.trim()) {
        const newMem = result.membership_id || null;
        if (newMem) await supabase.from('memberships').update({ collaborator_email: email.trim().toLowerCase() }).eq('id', newMem);
      }
      setMsg('Cuenta creada correctamente.'); setMsgType('ok');
      setEmail(''); setPassword(''); setNombre('');
      load();
    } catch(e) { setMsg('Error: ' + e.message); setMsgType('error'); }
    setSaving(false);
  };

  const handleToggle = async (u) => {
    const newStatus = u.status === 'active' ? 'inactive' : 'active';
    await supabase.from('memberships').update({ status: newStatus }).eq('id', u.id);
    load();
  };

  const handleDelete = async (u) => {
    if (!confirm('Eliminar la cuenta de ' + u.collaborator_email + '? El usuario no podrá entrar.')) return;
    await supabase.from('memberships').delete().eq('id', u.id);
    load();
  };

  const fmt = (ts) => ts ? new Date(ts).toLocaleDateString('es-PR') : '';

  return (
    <Modal title="⚙️ Gestión de Usuarios" onClose={onClose} wide>
      <div className="space-y-5">

        {/* Crear usuario */}
        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-4 space-y-3">
          <p className="text-sm font-bold text-yellow-800">Crear nueva cuenta</p>
          <Input type="email" placeholder="Email del usuario" value={email} onChange={e => setEmail(e.target.value)} />
          <Input type="password" placeholder="Contraseña (mín. 6)" value={password} onChange={e => setPassword(e.target.value)} />
          <Input type="text" placeholder="Nombre o referencia (opcional)" value={nombre} onChange={e => setNombre(e.target.value)} />
          {msg && <p className={`text-xs p-2 rounded ${msgType === 'ok' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>{msg}</p>}
          <button onClick={handleCreate} disabled={saving}
            className="w-full bg-yellow-500 text-yellow-900 font-bold py-2.5 rounded-lg hover:bg-yellow-400 disabled:opacity-50">
            {saving ? 'Creando...' : '+ Crear cuenta'}
          </button>
        </div>

        {/* Lista de usuarios */}
        <div>
          <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">
            Usuarios registrados ({usuarios.length})
          </p>
          {usuarios.length === 0
            ? <p className="text-sm text-gray-400 text-center py-4">No hay usuarios registrados aún</p>
            : <div className="space-y-2">
                {usuarios.map(u => (
                  <div key={u.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2.5 border border-gray-100">
                    <div className="min-w-0 flex-1">
                      <p className="text-sm font-medium text-gray-800 truncate">{u.collaborator_email}</p>
                      <p className="text-xs text-gray-400">Creado: {fmt(u.created_at)}</p>
                    </div>
                    <div className="flex items-center gap-2 ml-3 flex-shrink-0">
                      <button onClick={() => handleToggle(u)}
                        className={`text-xs px-2.5 py-1 rounded-full font-semibold ${u.status === 'active' ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-gray-200 text-gray-500 hover:bg-gray-300'}`}>
                        {u.status === 'active' ? 'Activo' : 'Inactivo'}
                      </button>
                      <button onClick={() => handleDelete(u)} className="text-red-400 hover:text-red-600 text-lg">🗑</button>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>
    </Modal>
  );
};

const GestionEquipoModal = ({ onClose, user, collaborators, setCollaborators }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [role, setRole] = useState('viewer');
  const [saving, setSaving] = useState(false);
  const [successMsg, setSuccessMsg] = useState('');
  const [errorMsg, setErrorMsg] = useState('');

  const handleAdd = async () => {
    if (!email.trim() || !password.trim()) { setErrorMsg('Email y contraseña son requeridos'); return; }
    if (password.length < 6) { setErrorMsg('La contraseña debe tener al menos 6 caracteres'); return; }
    const emailLower = email.trim().toLowerCase();
    if (collaborators.some(m => m.collaborator_email === emailLower)) {
      setErrorMsg('Este email ya está en tu equipo.'); return;
    }
    setSaving(true); setErrorMsg(''); setSuccessMsg('');
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify({
          email: email.trim().toLowerCase(),
          password: password.trim(),
          role,
          owner_id: user.id
        })
      });
      const result = await res.json();
      if (!res.ok) {
        setErrorMsg(result.error?.includes('already') ? 'Ese email ya tiene cuenta' : (result.error || 'Error al crear usuario'));
        setSaving(false); return;
      }
      setSuccessMsg(`Cuenta creada. ${email.trim()} ya puede entrar.`);
      setEmail(''); setPassword('');
      const { data: updated } = await supabase.from('memberships').select('*').eq('owner_id', user.id).order('created_at', { ascending: false });
      setCollaborators(updated || []);
    } catch(e) {
      setErrorMsg('Error de conexión: ' + e.message);
    }
    setSaving(false);
  };

  const handleRemove = async (id) => {
    if (!confirm('¿Quitar acceso a este usuario?')) return;
    await supabase.from('memberships').delete().eq('id', id);
    setCollaborators(prev => prev.filter(m => m.id !== id));
  };

  const handleRole = async (id, newRole) => {
    await supabase.from('memberships').update({ role: newRole }).eq('id', id);
    setCollaborators(prev => prev.map(m => m.id === id ? { ...m, role: newRole } : m));
  };

  return (
    <Modal title="👥 Mi Equipo" onClose={onClose}>
      <div className="space-y-4">
        <div className="bg-gray-50 rounded-xl p-4 space-y-3">
          <p className="text-sm font-bold text-gray-800">Crear acceso para alguien</p>
          <Input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
          <Input type="password" placeholder="Contraseña (mín. 6)" value={password} onChange={e => setPassword(e.target.value)} />
          <select value={role} onChange={e => setRole(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2.5 outline-none focus:ring-2 focus:ring-red-500">
            <option value="viewer">Viewer — Solo puede ver</option>
            <option value="editor">Editor — Puede ver y editar</option>
          </select>
          {errorMsg && <p className="text-xs text-red-600 bg-red-50 p-2 rounded">{errorMsg}</p>}
          {successMsg && <p className="text-xs text-green-600 bg-green-50 p-2 rounded">{successMsg}</p>}
          <button onClick={handleAdd} disabled={saving}
            className="w-full bg-red-700 text-white py-2.5 rounded-lg font-semibold hover:bg-red-800 disabled:opacity-50">
            {saving ? 'Creando...' : '+ Añadir al equipo'}
          </button>
        </div>

        {collaborators.length > 0 && (
          <div>
            <p className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Colaboradores actuales</p>
            <div className="space-y-2">
              {collaborators.map(m => (
                <div key={m.id} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
                  <div>
                    <p className="text-sm font-medium text-gray-800">{m.collaborator_email}</p>
                    <div className="flex items-center gap-2 mt-0.5">
                      <select value={m.role} onChange={e => handleRole(m.id, e.target.value)}
                        className="text-xs border-0 bg-transparent text-gray-500 outline-none p-0">
                        <option value="viewer">👁 Viewer</option>
                        <option value="editor">✏️ Editor</option>
                      </select>
                      <span className="text-xs text-gray-400">• {m.status === 'active' ? 'Activo' : 'Pendiente'}</span>
                    </div>
                  </div>
                  <button onClick={() => handleRemove(m.id)} className="text-red-400 hover:text-red-600 text-xl ml-2">✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
};
