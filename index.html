const PeleasModule = () => {
  const { gallos, opciones, addOpcion, toast } = useContext(AppContext);
  const [peleas, setPeleas] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showDetalle, setShowDetalle] = useState(null);
  const [loading, setLoading] = useState(true);

  const comoFueOpts = opciones.filter(o => o.tipo === 'como_fue').map(o => o.valor);
  const estiloOpts = opciones.filter(o => o.tipo === 'estilos_oponente').map(o => o.valor);

  const emptyForm = {
    gallo_id: null, fecha: new Date().toISOString().split('T')[0], lugar: '',
    duenio_oponente: '', peso_oponente_libras: '', peso_oponente_onzas: '', estilo_oponente: '',
    armador: '', resultado: 'Ganó', duracion: '', dinero_jugado: '', moneda: 'USD',
    como_fue: '', estilo_observado: '', puntos_positivos: '', puntos_negativos: '', lesiones: ''
  };
  const [form, setForm] = useState(emptyForm);
  const [galloSelected, setGalloSelected] = useState(null);

  const loadPeleas = async () => {
    setLoading(true);
    const { data } = await supabase.from('peleas').select('*, gallos(nombre, numero_pinches)').order('fecha', { ascending: false }).limit(100);
    if (data) setPeleas(data);
    setLoading(false);
  };

  useEffect(() => { loadPeleas(); }, []);

  const lugaresUnicos = [...new Set(peleas.filter(p => p.lugar).map(p => p.lugar))];

  const handleSave = async () => {
    if (!form.gallo_id) { toast('Selecciona un gallo', 'error'); return; }
    if (!form.resultado) { toast('El resultado es requerido', 'error'); return; }

    const data = {
      ...form,
      peso_oponente_libras: form.peso_oponente_libras ? parseInt(form.peso_oponente_libras) : null,
      peso_oponente_onzas: form.peso_oponente_onzas ? parseInt(form.peso_oponente_onzas) : null,
      duracion: form.duracion ? parseInt(form.duracion) : null,
      dinero_jugado: form.dinero_jugado ? parseFloat(form.dinero_jugado) : null,
    };

    let error;
    if (editingId) {
      const { created_at, updated_at, gallos: _, ...cleanData } = data;
      ({ error } = await supabase.from('peleas').update(cleanData).eq('id', editingId));
    } else {
      ({ error } = await supabase.from('peleas').insert(data));
    }

    if (error) { toast(error.message, 'error'); return; }
    toast(editingId ? 'Pelea actualizada' : 'Pelea registrada', 'success');
    setShowForm(false); setEditingId(null); setForm(emptyForm); setGalloSelected(null);
    loadPeleas();
  };

  const handleDelete = async (id) => {
    if (!confirm('¿Eliminar esta pelea?')) return;
    await supabase.from('peleas').delete().eq('id', id);
    toast('Eliminada', 'success');
    loadPeleas();
  };

  const handleEdit = (p) => {
    const gallo = gallos.find(g => g.id === p.gallo_id);
    setGalloSelected(gallo || null);
    setForm({ ...p });
    setEditingId(p.id);
    setShowForm(true);
  };

  // Stats rápidos
  const totalGanadas = peleas.filter(p => p.resultado === 'Ganó').length;
  const totalPerdidas = peleas.filter(p => p.resultado === 'Perdió').length;
  const totalDinero = peleas.reduce((sum, p) => {
    if (p.resultado === 'Ganó') return sum + (parseFloat(p.dinero_jugado) || 0);
    return sum - (parseFloat(p.dinero_jugado) || 0);
  }, 0);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-xl font-bold text-gray-800">Peleas</h2>
          <p className="text-sm text-gray-500">{peleas.length} registradas</p>
        </div>
        <button onClick={() => { setForm(emptyForm); setEditingId(null); setGalloSelected(null); setShowForm(true); }}
          className="bg-purple-600 text-white px-4 py-2.5 rounded-lg font-medium text-sm hover:bg-purple-700">
          + Nueva Pelea
        </button>
      </div>

      {/* Stats */}
      {peleas.length > 0 && (
        <div className="grid grid-cols-3 gap-2 mb-4">
          <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-green-700">{totalGanadas}</p>
            <p className="text-xs text-green-600">Ganadas</p>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
            <p className="text-2xl font-bold text-red-700">{totalPerdidas}</p>
            <p className="text-xs text-red-600">Perdidas</p>
          </div>
          <div className={`${totalDinero >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} border rounded-lg p-3 text-center`}>
            <p className={`text-2xl font-bold ${totalDinero >= 0 ? 'text-green-700' : 'text-red-700'}`}>${Math.abs(totalDinero).toFixed(0)}</p>
            <p className={`text-xs ${totalDinero >= 0 ? 'text-green-600' : 'text-red-600'}`}>{totalDinero >= 0 ? 'Ganancia' : 'Pérdida'}</p>
          </div>
        </div>
      )}

      {/* Lista */}
      {loading ? <p className="text-center text-gray-400 py-8">Cargando...</p> : (
        <div className="space-y-2">
          {peleas.length === 0 ? (
            <p className="text-center text-gray-400 py-12">No hay peleas registradas</p>
          ) : peleas.map(p => (
            <div key={p.id} className={`rounded-lg border p-3 ${p.resultado === 'Ganó' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}
              onClick={() => setShowDetalle(p)}>
              <div className="flex items-center justify-between">
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="font-medium text-sm text-gray-800">{p.gallos?.nombre || '#' + p.gallos?.numero_pinches}</span>
                    <span className={`text-xs font-bold ${p.resultado === 'Ganó' ? 'text-green-700' : 'text-red-700'}`}>{p.resultado === 'Ganó' ? '✅' : '❌'} {p.resultado}</span>
                  </div>
                  <p className="text-xs text-gray-500 mt-0.5">
                    {p.fecha} {p.lugar ? `• ${p.lugar}` : ''} {p.duracion ? `• ${p.duracion}min` : ''} {p.dinero_jugado ? `• $${p.dinero_jugado} ${p.moneda}` : ''}
                  </p>
                  {p.como_fue && <span className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded mt-1 inline-block">{p.como_fue}</span>}
                </div>
                <div className="flex gap-1">
                  <button onClick={(ev) => { ev.stopPropagation(); handleEdit(p); }} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/50 text-sm">✏️</button>
                  <button onClick={(ev) => { ev.stopPropagation(); handleDelete(p.id); }} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/50 text-sm">🗑</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal Detalle */}
      {showDetalle && (
        <Modal title="Detalle Pelea" onClose={() => setShowDetalle(null)}>
          {(() => { const p = showDetalle; return (
            <div className="space-y-3 text-sm">
              <div className={`p-3 rounded-lg text-center ${p.resultado === 'Ganó' ? 'bg-green-100' : 'bg-red-100'}`}>
                <p className="text-2xl font-bold">{p.resultado === 'Ganó' ? '✅ GANÓ' : '❌ PERDIÓ'}</p>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div><span className="text-gray-500">Gallo:</span> <span className="font-medium">{p.gallos?.nombre}</span></div>
                <div><span className="text-gray-500">Fecha:</span> <span className="font-medium">{p.fecha}</span></div>
                <div><span className="text-gray-500">Lugar:</span> <span className="font-medium">{p.lugar || 'N/A'}</span></div>
                <div><span className="text-gray-500">Duración:</span> <span className="font-medium">{p.duracion || 'N/A'} min</span></div>
                <div><span className="text-gray-500">Dinero:</span> <span className="font-medium">${p.dinero_jugado || 0} {p.moneda}</span></div>
                <div><span className="text-gray-500">Cómo fue:</span> <span className="font-medium">{p.como_fue || 'N/A'}</span></div>
                <div><span className="text-gray-500">Oponente:</span> <span className="font-medium">{p.duenio_oponente || 'N/A'}</span></div>
                <div><span className="text-gray-500">Peso Op.:</span> <span className="font-medium">{p.peso_oponente_libras || '?'}lb {p.peso_oponente_onzas || 0}oz</span></div>
                <div><span className="text-gray-500">Estilo Op.:</span> <span className="font-medium">{p.estilo_oponente || 'N/A'}</span></div>
                <div><span className="text-gray-500">Armador:</span> <span className="font-medium">{p.armador || 'N/A'}</span></div>
              </div>
              {p.estilo_observado && <div className="border-t pt-2"><p className="text-gray-500">Estilo observado: <span className="text-gray-800">{p.estilo_observado}</span></p></div>}
              {p.puntos_positivos && <div className="border-t pt-2"><p className="text-gray-500">Positivo: <span className="text-green-700">{p.puntos_positivos}</span></p></div>}
              {p.puntos_negativos && <div className="border-t pt-2"><p className="text-gray-500">Negativo: <span className="text-red-700">{p.puntos_negativos}</span></p></div>}
              {p.lesiones && <div className="border-t pt-2"><p className="text-gray-500">Lesiones: <span className="text-red-700">{p.lesiones}</span></p></div>}
            </div>
          ); })()}
        </Modal>
      )}

      {/* Modal Formulario */}
      {showForm && (
        <Modal title={editingId ? 'Editar Pelea' : 'Nueva Pelea'} onClose={() => setShowForm(false)}>
          <div className="space-y-4">
            <Field label="Gallo (amarrado)" required>
              <GalloSearch gallos={gallos} selected={galloSelected}
                onSelect={g => { setGalloSelected(g); setForm(f => ({...f, gallo_id: g.id})); }}
                onClear={() => { setGalloSelected(null); setForm(f => ({...f, gallo_id: null})); }}
                filter={g => g.amarrado} placeholder="Buscar gallo amarrado..." />
            </Field>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Fecha" required><Input type="date" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} /></Field>
              <Field label="Lugar">
                <Input type="text" placeholder="ej: Gallera..." value={form.lugar} onChange={e => setForm({...form, lugar: e.target.value})}
                  list="lugares-list" />
                <datalist id="lugares-list">{lugaresUnicos.map(l => <option key={l} value={l} />)}</datalist>
              </Field>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Dueño Oponente"><Input type="text" value={form.duenio_oponente} onChange={e => setForm({...form, duenio_oponente: e.target.value})} /></Field>
              <Field label="Armador"><Input type="text" value={form.armador} onChange={e => setForm({...form, armador: e.target.value})} /></Field>
            </div>

            <div className="grid grid-cols-3 gap-3">
              <Field label="Peso Op. (lb)"><Input type="number" value={form.peso_oponente_libras} onChange={e => setForm({...form, peso_oponente_libras: e.target.value})} /></Field>
              <Field label="Peso Op. (oz)"><Input type="number" min="0" max="15" value={form.peso_oponente_onzas} onChange={e => setForm({...form, peso_oponente_onzas: e.target.value})} /></Field>
              <Field label="Estilo Op.">
                <Select value={form.estilo_oponente} onChange={e => setForm({...form, estilo_oponente: e.target.value})}
                  options={[{value: '', label: 'Seleccionar...'}, ...estiloOpts]} />
              </Field>
            </div>

            <div className="grid grid-cols-3 gap-3">
              <Field label="Resultado" required>
                <Select value={form.resultado} onChange={e => setForm({...form, resultado: e.target.value})}
                  options={[{value:'Ganó',label:'✅ Ganó'},{value:'Perdió',label:'❌ Perdió'}]} />
              </Field>
              <Field label="Duración (min)"><Input type="number" value={form.duracion} onChange={e => setForm({...form, duracion: e.target.value})} /></Field>
              <Field label="Dinero">
                <div className="flex gap-1">
                  <Input type="number" placeholder="$" value={form.dinero_jugado} onChange={e => setForm({...form, dinero_jugado: e.target.value})} className="flex-1" />
                  <select value={form.moneda} onChange={e => setForm({...form, moneda: e.target.value})} className="border rounded-lg px-2 text-sm">
                    <option value="USD">USD</option><option value="RD$">RD$</option>
                  </select>
                </div>
              </Field>
            </div>

            {/* Cómo fue */}
            <div className="border-t pt-3">
              <p className="text-sm font-medium text-gray-700 mb-2">¿Cómo fue?</p>
              <div className="flex flex-wrap gap-1.5">
                {comoFueOpts.map(c => (
                  <button key={c} onClick={() => setForm({...form, como_fue: c})}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition ${
                      form.como_fue === c ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700'
                    }`}>{c}</button>
                ))}
              </div>
            </div>

            <Field label="Estilo Observado"><Input type="text" placeholder="¿Cómo peleó nuestro gallo?" value={form.estilo_observado} onChange={e => setForm({...form, estilo_observado: e.target.value})} /></Field>
            <Field label="Puntos Positivos"><Textarea placeholder="¿Qué hizo bien?" value={form.puntos_positivos} onChange={e => setForm({...form, puntos_positivos: e.target.value})} /></Field>
            <Field label="Puntos Negativos"><Textarea placeholder="¿Qué faltó?" value={form.puntos_negativos} onChange={e => setForm({...form, puntos_negativos: e.target.value})} /></Field>
            <Field label="Lesiones"><Textarea placeholder="Descripción de lesiones..." value={form.lesiones} onChange={e => setForm({...form, lesiones: e.target.value})} /></Field>

            <button onClick={handleSave} className="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700">
              {editingId ? 'Actualizar' : 'Guardar'} Pelea
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ============================================
// MÓDULO: DASHBOARD
// ============================================
const DashboardModule = () => {
  const { gallos, toast } = useContext(AppContext);
  const [selected, setSelected] = useState(null);
  const [entrenamientos, setEntrenamientos] = useState([]);
  const [peleas, setPeleas] = useState([]);
  const [showArbol, setShowArbol] = useState(false);
  const [showDetEnt, setShowDetEnt] = useState(null);
  const [showDetPel, setShowDetPel] = useState(null);

  const loadData = async (gallo) => {
    setSelected(gallo);
    const [{ data: ents }, { data: pels }] = await Promise.all([
      supabase.from('entrenamientos').select('*').eq('gallo_id', gallo.id).order('fecha', { ascending: false }).limit(50),
      supabase.from('peleas').select('*').eq('gallo_id', gallo.id).order('fecha', { ascending: false }).limit(50),
    ]);
    setEntrenamientos(ents || []);
    setPeleas(pels || []);
  };

  const padre = selected ? gallos.find(g => g.id === selected.padre_id) : null;
  const madre = selected ? gallos.find(g => g.id === selected.madre_id) : null;
  const ganadas = peleas.filter(p => p.resultado === 'Ganó').length;
  const perdidas = peleas.filter(p => p.resultado === 'Perdió').length;

  const desempenoColor = (d) => {
    if (d === 'Excelente') return 'bg-green-100 text-green-800';
    if (d === 'Bueno') return 'bg-blue-100 text-blue-800';
    if (d === 'Regular') return 'bg-yellow-100 text-yellow-800';
    return 'bg-red-100 text-red-800';
  };

  return (
    <div className="fade-in">
      <h2 className="text-xl font-bold text-gray-800 mb-1">Dashboard</h2>
      <p className="text-sm text-gray-500 mb-4">Busca un gallo para ver toda su información</p>

      <GalloSearch gallos={gallos} selected={selected}
        onSelect={loadData} onClear={() => { setSelected(null); setEntrenamientos([]); setPeleas([]); }}
        placeholder="Buscar gallo por nombre o pinches..." />

      {selected && (
        <div className="mt-4 space-y-4">
          {/* Info general */}
          <div className="bg-white rounded-lg border border-gray-200 p-4">
            <div className="flex items-start justify-between">
              <div>
                <h3 className="text-lg font-bold text-gray-800">{selected.nombre || 'Sin nombre'}</h3>
                <p className="text-sm text-gray-500">
                  {selected.numero_pinches ? `#${selected.numero_pinches} • ` : ''}{selected.sexo} • {selected.linea_genetica || 'Sin línea'}
                  {selected.color ? ` • ${selected.color}` : ''}
                </p>
              </div>
              {selected.amarrado && <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">AMARRADO</span>}
            </div>

            <div className="grid grid-cols-2 gap-3 mt-3">
              <div className="text-sm"><span className="text-gray-500">Padre:</span> <span className="font-medium">{padre ? (padre.nombre || '#' + padre.numero_pinches) : 'Desconocido'}</span></div>
              <div className="text-sm"><span className="text-gray-500">Madre:</span> <span className="font-medium">{madre ? (madre.nombre || '#' + madre.numero_pinches) : 'Desconocida'}</span></div>
            </div>

            {selected.caracteristicas && selected.caracteristicas.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-3">
                {selected.caracteristicas.map(c => <span key={c} className="text-xs bg-orange-50 text-orange-700 px-2 py-0.5 rounded">{c}</span>)}
              </div>
            )}

            {selected.amarrado && (
              <div className="grid grid-cols-3 gap-2 mt-3">
                <div className="bg-blue-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-blue-700">{entrenamientos.length}</p>
                  <p className="text-[10px] text-blue-600">Entrenamientos</p>
                </div>
                <div className="bg-green-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-green-700">{ganadas}</p>
                  <p className="text-[10px] text-green-600">Ganadas</p>
                </div>
                <div className="bg-red-50 rounded-lg p-2 text-center">
                  <p className="text-lg font-bold text-red-700">{perdidas}</p>
                  <p className="text-[10px] text-red-600">Perdidas</p>
                </div>
              </div>
            )}

            <button onClick={() => setShowArbol(true)} className="mt-3 w-full bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-200">
              🌳 Ver Árbol Genealógico
            </button>
          </div>

          {/* Entrenamientos recientes */}
          {selected.amarrado && (
            <div className="bg-white rounded-lg border border-gray-200 p-4">
              <h4 className="font-bold text-gray-800 mb-3">Últimos Entrenamientos</h4>
              {entrenamientos.length === 0 ? <p className="text-sm text-gray-400">Sin entrenamientos</p> : (
                <div className="space-y-1.5">
                  {entrenamientos.slice(0, 10).map(e => (
                    <div key={e.id} className="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0 cursor-pointer hover:bg-gray-50 -mx-1 px-1 rounded"
                      onClick={() => setShowDetEnt(e)}>
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-gray-500 w-20">{e.fecha}</span>
                        <span className="text-xs font-medium">{e.peso_libras}lb {e.peso_onzas}oz</span>
                        {(e.corrida || e.chata) && <span className="text-xs text-gray-400">{(parseFloat(e.corrida||0)+parseFloat(e.chata||0)).toFixed(0)}min</span>}
                      </div>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${desempenoColor(e.desempeno_general)}`}>{e.desempeno_general}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Peleas recientes */}
          {selected.amarrado && (
            <div className="bg-white rounded-lg border border-gray-200 p-4">
              <h4 className="font-bold text-gray-800 mb-3">Historial de Peleas</h4>
              {peleas.length === 0 ? <p className="text-sm text-gray-400">Sin peleas</p> : (
                <div className="space-y-1.5">
                  {peleas.slice(0, 10).map(p => (
                    <div key={p.id} className={`flex items-center justify-between py-1.5 px-2 rounded cursor-pointer ${p.resultado === 'Ganó' ? 'bg-green-50 hover:bg-green-100' : 'bg-red-50 hover:bg-red-100'}`}
                      onClick={() => setShowDetPel(p)}>
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-bold">{p.resultado === 'Ganó' ? '✅' : '❌'}</span>
                        <span className="text-xs text-gray-500">{p.fecha}</span>
                        <span className="text-xs">{p.duracion ? `${p.duracion}min` : ''}</span>
                      </div>
                      <div className="flex items-center gap-2">
                        {p.como_fue && <span className="text-[10px] text-purple-600">{p.como_fue}</span>}
                        <span className="text-xs font-medium">${p.dinero_jugado || 0}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* SECCIÓN GALLOS AMARRADOS */}
      {(() => {
        const amarrados = gallos.filter(g => g.amarrado);
        if (amarrados.length === 0) return null;
        return (
          <div className="mt-6">
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px bg-gray-200 flex-1" />
              <span className="text-sm font-bold text-red-700 uppercase tracking-wider">Gallos Amarrados ({amarrados.length})</span>
              <div className="h-px bg-gray-200 flex-1" />
            </div>
            <div className="space-y-2">
              {amarrados.map(g => {
                const pa = gallos.find(x => x.id === g.padre_id);
                const ma = gallos.find(x => x.id === g.madre_id);
                return (
                  <div key={g.id} className="bg-white rounded-lg border border-gray-200 p-3 cursor-pointer hover:border-red-300 active:bg-gray-50 transition"
                    onClick={() => loadData(g)}>
                    <div className="flex items-start justify-between">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-gray-800">{g.nombre || 'Sin nombre'}</span>
                          {g.numero_pinches && <span className="text-xs bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">#{g.numero_pinches}</span>}
                          <span className="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-medium">Amarrado</span>
                          <span className="text-xs text-gray-400">{g.sexo === 'Gallina' ? '♀' : '♂'}</span>
                        </div>
                        <p className="text-xs text-gray-500 mt-0.5">
                          {[g.linea_genetica, g.color].filter(Boolean).join(' • ') || 'Sin datos adicionales'}
                        </p>
                        <p className="text-xs text-gray-400 mt-0.5">
                          Padre: {pa ? (pa.nombre || '#' + pa.numero_pinches) : '?'} • Madre: {ma ? (ma.nombre || '#' + ma.numero_pinches) : '?'}
                        </p>
                        {g.caracteristicas && g.caracteristicas.length > 0 && (
                          <div className="flex flex-wrap gap-1 mt-1.5">
                            {g.caracteristicas.slice(0, 5).map(c => <span key={c} className="text-[10px] bg-orange-50 text-orange-700 px-1.5 py-0.5 rounded">{c}</span>)}
                            {g.caracteristicas.length > 5 && <span className="text-[10px] text-gray-400">+{g.caracteristicas.length - 5}</span>}
                          </div>
                        )}
                      </div>
                      <span className="text-gray-300 text-lg ml-2">›</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Árbol modal */}
      {showArbol && selected && (
        <Modal title={`Árbol: ${selected.nombre || '#' + selected.numero_pinches}`} onClose={() => setShowArbol(false)} wide>
          {(() => {
            const abueloP = padre ? gallos.find(g => g.id === padre.padre_id) : null;
            const abuelaP = padre ? gallos.find(g => g.id === padre.madre_id) : null;
            const abueloM = madre ? gallos.find(g => g.id === madre.padre_id) : null;
            const abuelaM = madre ? gallos.find(g => g.id === madre.madre_id) : null;

            const hermanos = gallos.filter(g => {
              if (g.id === selected.id) return false;
              const cp = selected.padre_id && g.padre_id && selected.padre_id === g.padre_id;
              const cm = selected.madre_id && g.madre_id && selected.madre_id === g.madre_id;
              return cp || cm;
            });
            const hijos = gallos.filter(g => g.padre_id === selected.id || g.madre_id === selected.id);
            const nietos = gallos.filter(g => hijos.some(h => h.id === g.padre_id || h.id === g.madre_id));

            const N = ({ g, l, hi, sm }) => (
              <div className={`border-2 rounded-lg p-2 text-center ${sm ? 'min-w-[80px]' : 'min-w-[90px]'} ${hi ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-white'}`}>
                <p className="text-[10px] text-gray-400 uppercase">{l}</p>
                {g ? <><p className={`font-bold ${sm ? 'text-[11px]' : 'text-xs'} ${hi ? 'text-red-800' : 'text-gray-800'}`}>{g.nombre || 'Sin nombre'} {g.numero_pinches ? `(#${g.numero_pinches})` : ''}</p><p className={`text-[10px] ${hi ? 'text-red-600' : 'text-gray-500'}`}>{g.linea_genetica||''}</p></> : <p className="text-[10px] text-gray-400 italic">?</p>}
              </div>
            );
            const SL = ({ text, count }) => (
              <div className="flex items-center gap-2 justify-center mb-1">
                <div className="h-px bg-gray-200 flex-1" /><span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">{text} {count > 0 ? `(${count})` : ''}</span><div className="h-px bg-gray-200 flex-1" />
              </div>
            );
            const Flecha = () => <div className="text-gray-300 text-xl text-center">↓</div>;

            return (
              <div className="overflow-x-auto">
                <div className="min-w-[500px] flex flex-col items-center gap-3 py-4">
                  <SL text="Abuelos" />
                  <div className="flex gap-2 justify-center flex-wrap"><N g={abueloP} l="Ab. Pat." /><N g={abuelaP} l="Ab. Pat." /><N g={abueloM} l="Ab. Mat." /><N g={abuelaM} l="Ab. Mat." /></div>
                  <Flecha />
                  <SL text="Padres" />
                  <div className="flex gap-6 justify-center"><N g={padre} l="Padre" /><N g={madre} l="Madre" /></div>
                  <Flecha />
                  <SL text={hermanos.length > 0 ? 'Gallo + Hermanos' : 'Gallo'} />
                  <div className="flex gap-2 justify-center items-start flex-wrap">
                    {hermanos.filter(h => { const cp = selected.padre_id && h.padre_id && selected.padre_id === h.padre_id; const cm = selected.madre_id && h.madre_id && selected.madre_id === h.madre_id; return cp && cm; }).map(h => <N key={h.id} g={h} l="Hermano" sm />)}
                    <N g={selected} l="★ Seleccionado" hi />
                    {hermanos.filter(h => { const cp = selected.padre_id && h.padre_id && selected.padre_id === h.padre_id; const cm = selected.madre_id && h.madre_id && selected.madre_id === h.madre_id; return !(cp && cm); }).map(h => <N key={h.id} g={h} l="Medio-Hno." sm />)}
                  </div>
                  {hijos.length > 0 && (<><Flecha /><SL text="Hijos y Descendientes" count={hijos.length} /><div className="flex gap-4 justify-center flex-wrap">{hijos.map(h => { const op = h.padre_id === selected.id ? gallos.find(x => x.id === h.madre_id) : gallos.find(x => x.id === h.padre_id); const nH = gallos.filter(n => n.padre_id === h.id || n.madre_id === h.id); return (<div key={h.id} className="flex flex-col items-center"><N g={h} l="Hijo/a" sm />{op && <p className="text-[9px] text-gray-400 mt-0.5">con {op.nombre || '#'+op.numero_pinches}</p>}{nH.length > 0 && (<div className="flex flex-col items-center mt-1"><div className="text-gray-300 text-xs">↓</div><div className="flex gap-1 flex-wrap justify-center">{nH.map(n => { const onP = n.padre_id === h.id ? gallos.find(x => x.id === n.madre_id) : gallos.find(x => x.id === n.padre_id); return (<div key={n.id} className="flex flex-col items-center"><N g={n} l="Nieto/a" sm />{onP && onP.id !== selected.id && <p className="text-[8px] text-gray-300">con {onP.nombre || '#'+onP.numero_pinches}</p>}</div>); })}</div></div>)}</div>); })}</div></>)}
                </div>
              </div>
            );
          })()}
        </Modal>
      )}

      {/* Detalle entrenamiento */}
      {showDetEnt && (
        <Modal title="Detalle Entrenamiento" onClose={() => setShowDetEnt(null)}>
          {(() => { const e = showDetEnt; return (
            <div className="space-y-3 text-sm">
              {/* Fecha y Peso */}
              <div className="grid grid-cols-2 gap-2">
                <div><span className="text-gray-500">Fecha:</span> <span className="font-medium">{e.fecha}</span></div>
                <div><span className="text-gray-500">Peso:</span> <span className="font-medium">{e.peso_libras}lb {e.peso_onzas}oz</span></div>
              </div>

              {/* Duración */}
              <div className="border-t pt-2">
                <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Duración</p>
                <div className="grid grid-cols-3 gap-2">
                  <div><span className="text-gray-500">Corrida:</span> <span className="font-medium">{e.corrida || 0} min</span></div>
                  <div><span className="text-gray-500">Chata:</span> <span className="font-medium">{e.chata || 0} min</span></div>
                  <div><span className="text-gray-500">Total:</span> <span className="font-medium">{(parseFloat(e.corrida||0) + parseFloat(e.chata||0)).toFixed(0)} min</span></div>
                </div>
              </div>

              {/* Condiciones del Día */}
              <div className="border-t pt-2">
                <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Condiciones del Día</p>
                <div className="grid grid-cols-2 gap-2">
                  <div><span className="text-gray-500">Clima:</span> <span className="font-medium">{e.clima}</span></div>
                  <div><span className="text-gray-500">Temperatura:</span> <span className="font-medium">{e.temperatura ? `${e.temperatura}°F` : 'N/A'}</span></div>
                  <div><span className="text-gray-500">Tomó Sol:</span> <span className="font-medium">{e.tomo_sol}</span></div>
                  <div><span className="text-gray-500">Intensidad:</span> <span className="font-medium">{e.intensidad}</span></div>
                </div>
              </div>

              {/* Ánimo y Condición */}
              <div className="border-t pt-2">
                <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Ánimo y Condición Física</p>
                <div className="grid grid-cols-2 gap-2">
                  <div><span className="text-gray-500">Ánimo:</span> <span className="font-medium">{e.animo_gallo}</span></div>
                  <div><span className="text-gray-500">Plumas General:</span> <span className="font-medium">{e.condicion_plumeras_general}</span></div>
                  <div><span className="text-gray-500">Plumas Alas:</span> <span className="font-medium">{e.condicion_plumeras_alas}</span></div>
                  <div><span className="text-gray-500">Plumas Rabos:</span> <span className="font-medium">{e.condicion_plumeras_rabos}</span></div>
                  <div><span className="text-gray-500">Problemas Alas:</span> <span className="font-medium">{e.problemas_alas}</span></div>
                  <div><span className="text-gray-500">Pico:</span> <span className="font-medium">{e.condicion_pico}</span></div>
                  <div><span className="text-gray-500">Espuelas:</span> <span className="font-medium">{e.condicion_espuelas}</span></div>
                </div>
              </div>

              {/* Nutrición */}
              <div className="border-t pt-2">
                <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Nutrición y Medicinas</p>
                {e.nutricion_items && e.nutricion_items.length > 0 ? (
                  <div className="flex flex-wrap gap-1 mb-2">{e.nutricion_items.map(n => <span key={n} className="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded">{n}</span>)}</div>
                ) : <p className="text-gray-400 text-xs mb-2">Sin nutrición registrada</p>}
                <div className="space-y-1">
                  <div><span className="text-gray-500">Desparasitante:</span> <span className="font-medium">{e.desparasitante || 'N/A'}</span></div>
                  <div><span className="text-gray-500">Medicinas:</span> <span className="font-medium">{e.medicinas_especiales || 'N/A'}</span></div>
                  <div><span className="text-gray-500">Alimentación Especial:</span> <span className="font-medium">{e.alimentacion_especial || 'N/A'}</span></div>
                </div>
              </div>

              {/* Desempeño */}
              <div className="border-t pt-2">
                <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Desempeño</p>
                <div className="grid grid-cols-3 gap-2">
                  <div><span className="text-gray-500">General:</span> <span className={`font-medium px-1.5 py-0.5 rounded ${desempenoColor(e.desempeno_general)}`}>{e.desempeno_general}</span></div>
                  <div><span className="text-gray-500">Velocidad:</span> <span className="font-medium">{e.velocidad}</span></div>
                  <div><span className="text-gray-500">Resistencia:</span> <span className="font-medium">{e.resistencia}</span></div>
                </div>
                {e.razon_malo && <p className="mt-1 text-red-600">Razón: {e.razon_malo}</p>}
              </div>

              {/* Observaciones */}
              {e.observaciones && (
                <div className="border-t pt-2">
                  <p className="text-xs font-bold text-gray-700 mb-1 uppercase">Observaciones</p>
                  <p className="text-gray-700 bg-gray-50 p-2 rounded">{e.observaciones}</p>
                </div>
              )}
            </div>
          ); })()}
        </Modal>
      )}

      {/* Detalle pelea */}
      {showDetPel && (
        <Modal title="Detalle Pelea" onClose={() => setShowDetPel(null)}>
          <div className="space-y-2 text-sm">
            <div className={`p-2 rounded text-center font-bold ${showDetPel.resultado === 'Ganó' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
              {showDetPel.resultado === 'Ganó' ? '✅ GANÓ' : '❌ PERDIÓ'}
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div><span className="text-gray-500">Fecha:</span> {showDetPel.fecha}</div>
              <div><span className="text-gray-500">Lugar:</span> {showDetPel.lugar || 'N/A'}</div>
              <div><span className="text-gray-500">Duración:</span> {showDetPel.duracion || '?'}min</div>
              <div><span className="text-gray-500">Dinero:</span> ${showDetPel.dinero_jugado||0} {showDetPel.moneda}</div>
              <div><span className="text-gray-500">Cómo fue:</span> {showDetPel.como_fue || 'N/A'}</div>
              <div><span className="text-gray-500">Armador:</span> {showDetPel.armador || 'N/A'}</div>
            </div>
            {showDetPel.puntos_positivos && <p className="border-t pt-2 text-green-700">+ {showDetPel.puntos_positivos}</p>}
            {showDetPel.puntos_negativos && <p className="text-red-700">- {showDetPel.puntos_negativos}</p>}
            {showDetPel.lesiones && <p className="border-t pt-2 text-red-700">Lesiones: {showDetPel.lesiones}</p>}
          </div>
        </Modal>
      )}
    </div>
  );
};

// ============================================
// APP PRINCIPAL
// ============================================
const App = () => {
  const [tab, setTab] = useState('dashboard');
  const [gallos, setGallos] = useState([]);
  const [opciones, setOpciones] = useState([]);
  const [toastMsg, setToastMsg] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(null);

  const toast = (msg, type = 'info') => setToastMsg({ msg, type });

  const loadGallos = async () => {
    const { data, error } = await supabase.from('gallos').select('*').order('nombre');
    if (error) { setDbError(error.message); return; }
    setGallos(data || []);
  };

  const loadOpciones = async () => {
    const { data } = await supabase.from('opciones_dinamicas').select('*').order('valor');
    setOpciones(data || []);
  };

  const addOpcion = async (tipo, valor) => {
    const { error } = await supabase.from('opciones_dinamicas').insert({ tipo, valor });
    if (!error) await loadOpciones();
  };

  useEffect(() => {
    const init = async () => {
      setLoading(true);
      await Promise.all([loadGallos(), loadOpciones()]);
      setLoading(false);
    };
    init();
  }, []);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-gray-100">
        <div className="text-center">
          <div className="animate-spin w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full mx-auto mb-4"></div>
          <p className="text-gray-500">Conectando a base de datos...</p>
        </div>
      </div>
    );
  }

  if (dbError) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
        <div className="bg-white rounded-2xl shadow-lg p-6 max-w-md w-full text-center">
          <p className="text-4xl mb-4">⚠️</p>
          <h2 className="text-lg font-bold text-gray-800 mb-2">Error de conexión</h2>
          <p className="text-sm text-gray-500 mb-4">{dbError}</p>
          <p className="text-xs text-gray-400 mb-4">Asegúrate de haber ejecutado el SQL de setup en tu Supabase Dashboard (SQL Editor).</p>
          <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-4 py-2 rounded-lg font-medium">Reintentar</button>
        </div>
      </div>
    );
  }

  const tabs = [
    { id: 'dashboard', label: 'Inicio', icon: '📊' },
    { id: 'genetica', label: 'Genética', icon: '🧬' },
    { id: 'entrenamientos', label: 'Entreno', icon: '🏋️' },
    { id: 'peleas', label: 'Peleas', icon: '⚔️' },
  ];

  return (
    <AppContext.Provider value={{ gallos, loadGallos, opciones, loadOpciones, addOpcion, toast }}>
      <div className="min-h-screen bg-gray-100 pb-20 md:pb-4">
        {/* Header */}
        <header className="bg-gradient-to-r from-red-700 to-red-600 text-white px-4 py-3 shadow-lg sticky top-0 z-30">
          <div className="max-w-4xl mx-auto flex items-center justify-between">
            <div>
              <h1 className="text-lg font-bold">GallosPR</h1>
              <p className="text-[10px] text-red-200">Sistema de Gestión</p>
            </div>
            {/* Desktop tabs */}
            <div className="hidden md:flex gap-1">
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition ${
                    tab === t.id ? 'bg-white/20 text-white' : 'text-red-200 hover:text-white hover:bg-white/10'
                  }`}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
        </header>

        {/* Content */}
        <main className="max-w-4xl mx-auto p-4">
          {tab === 'dashboard' && <DashboardModule />}
          {tab === 'genetica' && <GeneticaModule />}
          {tab === 'entrenamientos' && <EntrenamientosModule />}
          {tab === 'peleas' && <PeleasModule />}
        </main>

        {/* Mobile bottom nav */}
        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-30 safe-area-bottom">
          <div className="flex">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 transition ${
                  tab === t.id ? 'text-red-600' : 'text-gray-400'
                }`}>
                <span className="text-lg">{t.icon}</span>
                <span className="text-[10px] font-medium">{t.label}</span>
              </button>
            ))}
          </div>
        </nav>

        {/* Toast */}
        {toastMsg && <Toast message={toastMsg.msg} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
      </div>
    </AppContext.Provider>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
